<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scout — 行前確認</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sage-50:#EAF2ED; --sage-200:#C2DDD1; --sage-400:#8AB8A0;
  --sage-600:#5C8C72; --sage-800:#3D6B54; --sage-900:#2A4D3A;
  --linen-50:#F5F0EA; --linen-200:#DCD8D0; --linen-400:#A8A298;
  --linen-700:#6B6558; --linen-900:#3C3830;
  --wheat-50:#FBF0E0; --wheat-200:#E8C898; --wheat-400:#C4915A; --wheat-700:#7A5230;
  --red-50:#FEF0EE; --red-200:#FACFC8; --red-400:#E07060; --red-600:#C0392B;
  --font-sans:'Noto Sans TC',sans-serif;
  --font-serif:'Noto Serif TC',sans-serif;
}
body { background:var(--linen-50); font-family:var(--font-sans); color:var(--linen-900); min-height:100vh; padding-bottom:6rem; }

/* 同步狀態 */
.sync-bar { position:fixed; top:0; left:0; right:0; height:3px; z-index:999; background:transparent; transition:background 0.3s; }
.sync-bar.syncing { background:var(--sage-400); animation:syncPulse 1s ease-in-out infinite; }
.sync-bar.error   { background:#e74c3c; }
@keyframes syncPulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.sync-badge { position:fixed; bottom:1.5rem; right:1.5rem; z-index:200; background:#fff; border:0.5px solid var(--linen-200); border-radius:100px; padding:6px 14px; font-size:12px; color:var(--linen-400); box-shadow:0 2px 8px rgba(0,0,0,0.08); display:flex; align-items:center; gap:6px; transition:all 0.3s; }
.sync-dot { width:7px; height:7px; border-radius:50%; background:var(--linen-200); transition:background 0.3s; }
.sync-badge.live    .sync-dot { background:var(--sage-800); }
.sync-badge.syncing .sync-dot { background:var(--wheat-400); animation:syncPulse 0.8s infinite; }
.sync-badge.error   .sync-dot { background:#e74c3c; }

/* ── 舊版首頁 Header ── */
.header-home { background:var(--linen-50); border-bottom:0.5px solid var(--linen-200); padding:1.25rem 1.5rem; position:sticky; top:0; z-index:100; }
.header-home-inner { max-width:680px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:1rem; }
.brand { display:flex; align-items:center; gap:10px; }
.brand-logo { width:36px; height:36px; border:2px solid var(--sage-800); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1rem; flex-shrink:0; }
.brand-name { font-size:22px; color:var(--linen-900); font-family:var(--font-serif); }
.brand-sub  { font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--linen-400); }
.btn-ghost { background:transparent; color:var(--linen-400); border:1px solid var(--linen-200); border-radius:100px; padding:8px 18px; font-size:13px; font-family:var(--font-sans); cursor:pointer; transition:all 0.15s; }
.btn-ghost:hover { color:var(--linen-900); border-color:var(--linen-400); }
.main-home { max-width:680px; margin:0 auto; padding:2rem 1.5rem 0; }
.page-title { font-size:30px; font-weight:500; font-family:var(--font-serif); color:var(--linen-900); line-height:1.3; margin-bottom:0.3rem; }
.page-sub   { font-size:16px; font-style:italic; color:var(--linen-400); font-family:var(--font-serif); margin-bottom:2rem; }
.trip-selector-home { display:flex; align-items:center; gap:10px; margin-bottom:1.5rem; flex-wrap:wrap; }
.trip-select-home { flex:1; min-width:160px; border:1.5px solid var(--sage-400); border-radius:100px; padding:9px 36px 9px 18px; font-size:14px; font-family:var(--font-sans); color:var(--linen-900); background:#fff; outline:none; appearance:none; cursor:pointer; background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 7L11 1' stroke='%238AB8A0' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat:no-repeat; background-position:right 14px center; }

/* ── 新版 Header（選了旅程後）── */
.header-board { background:var(--linen-50); border-bottom:0.5px solid var(--linen-200); padding:10px 16px; position:sticky; top:0; z-index:100; display:flex; align-items:center; gap:10px; }
.board-logo { width:28px; height:28px; border:2px solid var(--sage-800); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; flex-shrink:0; }
.trip-select-board { flex:1; min-width:0; border:1.5px solid var(--sage-400); border-radius:100px; padding:5px 28px 5px 12px; font-size:12px; font-family:var(--font-sans); color:var(--linen-900); background:#fff; outline:none; appearance:none; cursor:pointer; background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%238AB8A0' stroke-width='1.2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat:no-repeat; background-position:right 10px center; }

/* 必須未確認徽章（紅色）*/
.urgent-badge { flex-shrink:0; background:var(--red-50); border:1.5px solid var(--red-200); border-radius:100px; padding:3px 10px; display:flex; align-items:center; gap:3px; transition:all 0.3s; }
.urgent-badge-num { font-size:14px; font-weight:700; color:var(--red-600); font-family:var(--font-serif); line-height:1; }
.urgent-badge-lbl { font-size:10px; color:var(--red-400); }
.urgent-badge.clear { background:var(--sage-50); border-color:var(--sage-200); }
.urgent-badge.clear .urgent-badge-num { color:var(--sage-800); }
.urgent-badge.clear .urgent-badge-lbl { color:var(--sage-600); }

.ai-btn { flex-shrink:0; border-radius:100px; padding:4px 10px; font-size:11px; font-family:var(--font-sans); cursor:pointer; background:transparent; border:1px solid var(--linen-200); color:var(--linen-400); transition:all 0.15s; }
.ai-btn:hover { color:var(--linen-900); border-color:var(--linen-400); }
.add-btn { width:28px; height:28px; border-radius:50%; background:var(--sage-800); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; color:#fff; font-size:17px; line-height:1; transition:background 0.15s; }
.add-btn:hover { background:var(--sage-900); }

/* Filter 列 */
.filter-bar { display:flex; gap:6px; padding:8px 16px; overflow-x:auto; scrollbar-width:none; border-bottom:0.5px solid var(--linen-200); background:#fff; position:sticky; top:49px; z-index:99; }
.filter-bar::-webkit-scrollbar { display:none; }
.filter-btn { flex-shrink:0; border-radius:100px; padding:4px 12px; font-size:11px; font-family:var(--font-sans); cursor:pointer; border:1.5px solid var(--linen-200); background:#fff; color:var(--linen-700); white-space:nowrap; transition:all 0.15s; }
.filter-btn:hover { border-color:var(--sage-400); color:var(--sage-800); }
.filter-btn.active { background:var(--sage-800); border-color:var(--sage-800); color:#fff; }

/* 新增面板 */
.add-panel { display:none; background:#fff; border-bottom:0.5px solid var(--linen-200); padding:14px 16px; }
.add-panel.open { display:block; }
.add-panel-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.add-panel-title { font-size:13px; font-weight:500; color:var(--linen-700); }
.add-panel-close { background:none; border:none; cursor:pointer; font-size:16px; color:var(--linen-400); line-height:1; padding:0 4px; }
.form-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
.form-field { display:flex; flex-direction:column; gap:3px; flex:1; min-width:100px; }
.form-label { font-size:10px; color:var(--linen-400); letter-spacing:0.06em; text-transform:uppercase; }
.form-input { border:1.5px solid var(--sage-400); border-radius:100px; padding:7px 14px; font-size:13px; font-family:var(--font-sans); color:var(--linen-900); background:#fff; outline:none; width:100%; transition:border-color 0.15s; }
.form-input:focus { border-color:var(--sage-800); box-shadow:0 0 0 2px rgba(61,107,84,0.10); }
.form-select { border:1.5px solid var(--sage-400); border-radius:100px; padding:7px 30px 7px 14px; font-size:13px; font-family:var(--font-sans); color:var(--linen-900); background:#fff; outline:none; appearance:none; cursor:pointer; width:100%; background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%238AB8A0' stroke-width='1.2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat:no-repeat; background-position:right 10px center; }
.form-submit-row { display:flex; justify-content:flex-end; margin-top:4px; }
.btn-primary { display:inline-flex; align-items:center; gap:8px; border-radius:100px; padding:8px 8px 8px 18px; font-size:13px; font-family:var(--font-sans); cursor:pointer; border:none; background:var(--sage-800); color:#fff; transition:background 0.15s; }
.btn-primary:hover { background:var(--sage-900); }
.icon-circle { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; background:var(--sage-50); }

/* ── 優先級儀表板主體 ── */
.board-body { max-width:720px; margin:0 auto; padding:14px 16px; }

/* 區段標題 */
.section-label { display:flex; align-items:center; gap:8px; padding:8px 2px 6px; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; font-family:var(--font-sans); }
.section-label.urgent { color:var(--red-600); }
.section-label.flexible { color:var(--wheat-700); }
.section-label.done { color:var(--linen-400); }
.section-line { flex:1; height:0.5px; }
.section-label.urgent   .section-line { background:var(--red-200); }
.section-label.flexible .section-line { background:var(--wheat-200); }
.section-label.done     .section-line { background:var(--linen-200); }

.items-list { display:flex; flex-direction:column; gap:5px; margin-bottom:4px; }

/* 項目卡片 */
.item-card { background:#fff; border:0.5px solid var(--linen-200); border-radius:12px; padding:9px 12px; display:flex; align-items:center; gap:10px; position:relative; overflow:hidden; transition:border-color 0.2s, box-shadow 0.2s; animation:slideIn 0.18s ease both; }
.item-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; }

/* 必須 × 未確認 */
.item-card.must.pending { border-color:var(--red-200); background:var(--red-50); }
.item-card.must.pending::before { background:var(--red-600); }
/* 彈性 × 未確認 */
.item-card.flex.pending::before { background:var(--wheat-400); }
/* 已確認 */
.item-card.confirmed { opacity:0.45; }
.item-card.confirmed::before { background:var(--sage-800); }
.item-card:hover { border-color:var(--sage-200); box-shadow:0 3px 10px rgba(61,107,84,0.07); }
.item-card.must.pending:hover { border-color:var(--red-400); }

.item-main { flex:1; min-width:0; }
.item-name { font-size:13px; font-weight:500; color:var(--linen-900); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.4; }
.item-card.must.pending .item-name { color:var(--red-600); }
.item-card.confirmed .item-name { color:var(--linen-400); }
.item-sub { display:flex; align-items:center; gap:5px; margin-top:3px; flex-wrap:wrap; }
.cat-tag { display:inline-block; font-size:10px; color:var(--linen-400); background:var(--linen-50); border:0.5px solid var(--linen-200); border-radius:4px; padding:1px 6px; }
.day-tag { font-size:10px; color:var(--linen-400); }
.item-notes-sm { font-size:11px; color:var(--linen-700); font-style:italic; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:120px; }

.item-right { flex-shrink:0; display:flex; flex-direction:column; align-items:flex-end; gap:4px; }

/* 優先級切換按鈕 */
.priority-btn { font-size:10px; border-radius:100px; padding:2px 9px; cursor:pointer; border:none; font-family:var(--font-sans); transition:all 0.15s; white-space:nowrap; }
.priority-btn.must { background:var(--red-50); color:var(--red-600); border:1px solid var(--red-200); }
.priority-btn.flex { background:var(--wheat-50); color:var(--wheat-700); border:1px solid var(--wheat-200); }
.priority-btn:hover { filter:brightness(0.95); }

/* 狀態選擇器 */
.status-select { border:1.5px solid var(--linen-200); border-radius:100px; padding:2px 20px 2px 8px; font-size:10px; font-family:var(--font-sans); color:var(--linen-700); background:var(--linen-50); outline:none; appearance:none; cursor:pointer; background-image:url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 8 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L4 4L7 1' stroke='%23A8A298' stroke-width='1' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat:no-repeat; background-position:right 7px center; flex-shrink:0; transition:all 0.15s; }
.status-select[data-status="候選"]   { background-color:var(--linen-50);  color:var(--linen-400);  border-color:var(--linen-200); }
.status-select[data-status="選定"]   { background-color:var(--wheat-50);  color:var(--wheat-700);  border-color:var(--wheat-200); }
.status-select[data-status="跟進中"] { background-color:var(--sage-50);   color:var(--sage-800);   border-color:var(--sage-200); }
.status-select[data-status="等回覆"] { background-color:var(--wheat-50);  color:var(--wheat-700);  border-color:var(--wheat-400); }
.status-select[data-status="已確認"] { background-color:var(--sage-50);   color:var(--sage-800);   border-color:var(--sage-800); }

.delete-btn { background:none; border:none; cursor:pointer; font-size:11px; color:var(--linen-200); padding:0 2px; transition:color 0.15s; }
.delete-btn:hover { color:var(--linen-400); }

/* Inline 編輯 */
.inline-input { font-family:var(--font-sans); font-size:13px; font-weight:500; color:var(--linen-900); background:var(--sage-50); border:1.5px solid var(--sage-400); border-radius:6px; padding:2px 6px; outline:none; width:100%; }

/* Empty states */
.empty-state { text-align:center; padding:3rem 1rem; color:var(--linen-400); }
.empty-state-icon { font-size:2.5rem; margin-bottom:1rem; }
.empty-state-text { font-size:15px; font-style:italic; font-family:var(--font-serif); }

/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(60,56,48,0.45); z-index:200; display:flex; align-items:center; justify-content:center; padding:1rem; opacity:0; pointer-events:none; transition:opacity 0.2s; }
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal { background:#fff; border-radius:24px; padding:2rem; width:100%; max-width:440px; transform:translateY(12px); transition:transform 0.2s; }
.modal-overlay.open .modal { transform:translateY(0); }
.modal-title { font-size:22px; font-family:var(--font-serif); color:var(--linen-900); margin-bottom:1.5rem; }
.modal-actions { display:flex; gap:10px; margin-top:1.5rem; justify-content:flex-end; }
.ai-modal { max-width:560px; }
.ai-textarea { width:100%; border:1.5px solid var(--sage-400); border-radius:16px; padding:14px 16px; font-size:14px; font-family:var(--font-sans); color:var(--linen-900); background:#fff; outline:none; resize:vertical; min-height:140px; line-height:1.7; }
.ai-textarea::placeholder { color:var(--linen-400); }
.ai-key-row { display:flex; align-items:center; gap:8px; margin-top:10px; }
.ai-key-label { font-size:11px; color:var(--linen-400); white-space:nowrap; letter-spacing:0.05em; text-transform:uppercase; }
.ai-key-input { flex:1; border:1.5px solid var(--linen-200); border-radius:100px; padding:7px 14px; font-size:13px; font-family:monospace; color:var(--linen-700); background:var(--linen-50); outline:none; }
.ai-loading { display:flex; flex-direction:column; align-items:center; gap:1rem; padding:2rem 0; }
.ai-spinner { width:32px; height:32px; border:2.5px solid var(--sage-200); border-top-color:var(--sage-800); border-radius:50%; animation:spin 0.7s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.ai-loading-text { font-size:14px; font-style:italic; color:var(--linen-400); font-family:var(--font-serif); }
.ai-error { background:#fff3f3; border:1px solid #f0c0c0; border-radius:12px; padding:12px 16px; font-size:13px; color:#c0392b; margin:1rem 0; }
.preview-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.preview-count { font-size:12px; color:var(--linen-400); }
.preview-select-all { font-size:12px; color:var(--sage-800); cursor:pointer; text-decoration:underline; background:none; border:none; padding:0; font-family:var(--font-sans); }
.preview-list { display:flex; flex-direction:column; gap:8px; margin:1rem 0; max-height:300px; overflow-y:auto; }
.preview-item { display:flex; align-items:flex-start; gap:10px; background:var(--linen-50); border:0.5px solid var(--linen-200); border-radius:12px; padding:10px 14px; cursor:pointer; transition:all 0.15s; }
.preview-item.selected { background:var(--sage-50); border-color:var(--sage-400); }
.preview-check { width:18px; height:18px; border-radius:50%; border:1.5px solid var(--linen-200); flex-shrink:0; margin-top:2px; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
.preview-item.selected .preview-check { background:var(--sage-800); border-color:var(--sage-800); }
.preview-check svg { display:none; }
.preview-item.selected .preview-check svg { display:block; }
.preview-body { flex:1; min-width:0; }
.preview-name { font-size:14px; font-weight:500; color:var(--linen-900); margin-bottom:2px; }
.preview-meta { font-size:12px; color:var(--linen-400); }
.preview-notes { font-size:12px; font-style:italic; color:var(--linen-700); margin-top:2px; }
.preview-status-badge { font-size:11px; border-radius:100px; padding:2px 10px; white-space:nowrap; flex-shrink:0; }
.badge-候選   { background:var(--linen-200); color:var(--linen-700); }
.badge-選定   { background:var(--wheat-50); color:var(--wheat-700); border:1px solid var(--wheat-200); }
.badge-跟進中 { background:var(--sage-50); color:var(--sage-800); border:1px solid var(--sage-200); }
.badge-等回覆 { background:var(--wheat-50); color:var(--wheat-700); border:1px solid var(--wheat-400); }
.badge-已確認 { background:var(--sage-50); color:var(--sage-800); border:1px solid var(--sage-800); }

@keyframes slideIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div class="sync-bar" id="sync-bar"></div>
<div class="sync-badge" id="sync-badge"><div class="sync-dot"></div><span id="sync-label">連線中…</span></div>

<!-- 舊版首頁 Header（未選旅程）-->
<header class="header-home" id="header-home">
  <div class="header-home-inner">
    <div class="brand">
      <div class="brand-logo">🔍</div>
      <div><div class="brand-name">Scout</div><div class="brand-sub">行前確認</div></div>
    </div>
    <button class="btn-ghost" onclick="openTripModal()">＋ 新增旅程</button>
  </div>
</header>

<!-- 新版 Header（選了旅程後）-->
<header class="header-board" id="header-board" style="display:none">
  <div class="board-logo">🔍</div>
  <select class="trip-select-board" id="trip-select-board" onchange="onTripChange(this.value)">
    <option value="">— 選擇旅程 —</option>
  </select>
  <div class="urgent-badge" id="urgent-badge">
    <span class="urgent-badge-num" id="urgent-num">0</span>
    <span class="urgent-badge-lbl" id="urgent-lbl">必須未確認</span>
  </div>
  <button class="ai-btn" onclick="openAiModal()">✦ AI</button>
  <button class="add-btn" onclick="toggleAddPanel()" title="新增項目">＋</button>
</header>

<!-- Filter 列 -->
<div class="filter-bar" id="filter-bar" style="display:none">
  <button class="filter-btn active" onclick="setFilter('all',this)">全部</button>
  <button class="filter-btn" onclick="setFilter('必須',this)">必須確認</button>
  <button class="filter-btn" onclick="setFilter('彈性',this)">可以彈性</button>
  <button class="filter-btn" onclick="setFilter('未確認',this)">未確認</button>
  <button class="filter-btn" onclick="setFilter('已確認',this)">已確認</button>
</div>

<!-- 新增面板 -->
<div class="add-panel" id="add-panel">
  <div class="add-panel-header">
    <div class="add-panel-title">新增行程項目</div>
    <button class="add-panel-close" onclick="toggleAddPanel()">✕</button>
  </div>
  <div class="form-row">

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js';
import { getDatabase, ref, set, push, remove, onValue, update } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyAXzF_wiFJBzBy8vh-clfWK2AIZ1uCR5vg",
  authDomain: "scout-checklist.firebaseapp.com",
  databaseURL: "https://scout-checklist-default-rtdb.firebaseio.com",
  projectId: "scout-checklist",
  storageBucket: "scout-checklist.firebasestorage.app",
  messagingSenderId: "441876091472",
  appId: "1:441876091472:web:29e20124a5a40493417755"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const STATUSES         = ['候選','選定','跟進中','等回覆','已確認'];
const PENDING_STATUSES = new Set(['候選','選定','跟進中','等回覆']);
const VALID_CATS       = ['餐廳','景點','交通','住宿','其他'];
const AI_KEY_STORE     = 'scout_ai_key';
let trips={}, items={}, currentTripId=null, currentFilter='all';

function setSyncStatus(s){
  const bar=document.getElementById('sync-bar'),badge=document.getElementById('sync-badge'),label=document.getElementById('sync-label');
  bar.className='sync-bar'+(s==='syncing'?' syncing':s==='error'?' error':'');
  badge.className='sync-badge'+(s==='live'?' live':s==='syncing'?' syncing':s==='error'?' error':'');
  label.textContent=s==='live'?'即時同步':s==='syncing'?'同步中…':s==='error'?'連線失敗':'連線中…';
}

onValue(ref(db,'trips'),snap=>{trips=snap.val()||{};renderTripSelects(currentTripId);render();setSyncStatus('live');},err=>{setSyncStatus('error');console.error(err);});
onValue(ref(db,'items'),snap=>{items=snap.val()||{};render();},err=>console.error(err));

window.createTrip=function(){
  const name=document.getElementById('modal-trip-name').value.trim();
  const start=document.getElementById('modal-start').value,end=document.getElementById('modal-end').value;
  if(!name){alert('請輸入旅程名稱');return;}
  setSyncStatus('syncing');
  const nr=push(ref(db,'trips'));
  set(nr,{name,startDate:start,endDate:end}).then(()=>{closeTripModal();currentTripId=nr.key;renderTripSelects(currentTripId);render();setSyncStatus('live');});
};

window.deleteCurrentTrip=function(){
  if(!currentTripId)return;
  const trip=trips[currentTripId];if(!trip)return;
  if(!confirm('確定要刪除「'+trip.name+'」？'))return;
  setSyncStatus('syncing');
  Object.keys(items).forEach(k=>{if(items[k].tripId===currentTripId)remove(ref(db,'items/'+k));});
  remove(ref(db,'trips/'+currentTripId)).then(()=>{currentTripId=null;render();setSyncStatus('live');});
};

window.addItem=function(){
  if(!currentTripId)return;
  const name=document.getElementById('new-name').value.trim();
  const day=parseInt(document.getElementById('new-day').value)||1;
  const priority=document.getElementById('new-priority').value;
  const category=document.getElementById('new-category').value;
  const status=document.getElementById('new-status').value;
  const notes=document.getElementById('new-notes').value.trim();
  if(!name){alert('請輸入項目名稱');return;}
  let maxOrder=0;
  Object.values(items).forEach(i=>{if(i.tripId===currentTripId&&i.day===day)maxOrder=Math.max(maxOrder,(i.order||0)+1);});
  setSyncStatus('syncing');
  push(ref(db,'items'),{tripId:currentTripId,day,name,priority,category,status,notes,order:maxOrder});
  document.getElementById('new-name').value='';document.getElementById('new-notes').value='';
};

window.updateStatus=function(k,s){
  setSyncStatus('syncing');update(ref(db,'items/'+k),{status:s});
  const card=document.querySelector('.item-card[data-id="'+k+'"]');
  if(card){
    card.setAttribute('data-status',s);
    const isDone=s==='已確認';
    const isMust=(items[k]?.priority||'必須')==='必須';
    card.className='item-card'+(isMust?' must':' flex')+(isDone?' confirmed':' pending');
    const sel=card.querySelector('.status-select');
    if(sel)sel.setAttribute('data-status',s);
    // 狀態改變後重新 render 以便重新排序
    render();
  }
};

window.togglePriority=function(k){
  const current=items[k]?.priority||'必須';
  const next=current==='必須'?'彈性':'必須';
  setSyncStatus('syncing');
  update(ref(db,'items/'+k),{priority:next});
};

window.deleteItem=function(k){
  setSyncStatus('syncing');
  const card=document.querySelector('.item-card[data-id="'+k+'"]');
  if(card){card.style.transition='opacity 0.2s';card.style.opacity='0';}
  setTimeout(()=>remove(ref(db,'items/'+k)),180);
};

// ── 主 Render（優先級排序）──
window.render=function(){
  const hasTrip=!!currentTripId;
  document.getElementById('header-home').style.display=hasTrip?'none':'';
  document.getElementById('header-board').style.display=hasTrip?'':'none';
  document.getElementById('main-home').style.display=hasTrip?'none':'';
  document.getElementById('board-body').style.display=hasTrip?'':'none';
  document.getElementById('filter-bar').style.display=hasTrip?'':'none';
  document.getElementById('add-panel').classList.remove('open');

  if(!hasTrip){
    document.getElementById('delete-trip-btn').style.display='none';
    document.getElementById('no-trip-state').style.display=Object.keys(trips).length===0?'':'none';
    return;
  }

  const allItems=Object.entries(items)
    .filter(([,v])=>v.tripId===currentTripId)
    .map(([k,v])=>({_key:k,...v,priority:v.priority||'必須'}));

  // 更新必須未確認徽章
  const urgentCount=allItems.filter(i=>i.priority==='必須'&&PENDING_STATUSES.has(i.status)).length;
  const badge=document.getElementById('urgent-badge');
  document.getElementById('urgent-num').textContent=urgentCount;
  badge.classList.toggle('clear',urgentCount===0&&allItems.length>0);
  document.getElementById('urgent-lbl').textContent=(urgentCount===0&&allItems.length>0)?'全部確認 ✓':'必須未確認';

  // Filter
  let filtered=allItems;
  if(currentFilter==='必須')filtered=allItems.filter(i=>i.priority==='必須');
  else if(currentFilter==='彈性')filtered=allItems.filter(i=>i.priority==='彈性');
  else if(currentFilter==='未確認')filtered=allItems.filter(i=>PENDING_STATUSES.has(i.status));
  else if(currentFilter==='已確認')filtered=allItems.filter(i=>i.status==='已確認');

  if(allItems.length===0){
    document.getElementById('board-container').innerHTML='<div class="empty-state"><div class="empty-state-icon">🗺️</div><div class="empty-state-text">還沒有行程項目<br>點右上角「＋」新增</div></div>';
    return;
  }

  // 三個區段
  const mustPending  = filtered.filter(i=>i.priority==='必須'&&PENDING_STATUSES.has(i.status));
  const flexPending  = filtered.filter(i=>i.priority==='彈性'&&PENDING_STATUSES.has(i.status));
  const done         = filtered.filter(i=>i.status==='已確認');

  let html='';

  if(mustPending.length>0){
    html+=`<div class="section-label urgent">必須確認・未確認<div class="section-line"></div></div>`;
    html+=`<div class="items-list">${mustPending.map(renderCard).join('')}</div>`;
  }
  if(flexPending.length>0){
    html+=`<div class="section-label flexible">可以彈性・未確認<div class="section-line"></div></div>`;
    html+=`<div class="items-list">${flexPending.map(renderCard).join('')}</div>`;
  }
  if(done.length>0){
    html+=`<div class="section-label done">已確認<div class="section-line"></div></div>`;
    html+=`<div class="items-list">${done.map(renderCard).join('')}</div>`;
  }
  if(mustPending.length===0&&flexPending.length===0&&done.length===0){
    html='<div class="empty-state"><div class="empty-state-icon">✅</div><div class="empty-state-text">這個篩選條件下沒有項目</div></div>';
  }

  document.getElementById('board-container').innerHTML=html;
};

function renderCard(item){
  const isDone=item.status==='已確認';
  const isMust=item.priority==='必須';
  const cardClass='item-card'+(isMust?' must':' flex')+(isDone?' confirmed':' pending');
  const opts=STATUSES.map(s=>`<option value="${s}"${s===item.status?' selected':''}>${s}</option>`).join('');
  const priorityLabel=isMust?'必須':'彈性';
  const priorityClass=isMust?'must':'flex';
  return `<div class="${cardClass}" data-id="${item._key}" data-status="${escapeHtml(item.status)}">
    <div class="item-main">
      <div class="item-name" onclick="startEditName('${item._key}',this)">${escapeHtml(item.name)}</div>
      <div class="item-sub">
        <span class="cat-tag">${escapeHtml(item.category)}</span>
        <span class="day-tag">Day ${item.day}</span>
        ${item.notes?`<span class="item-notes-sm">${escapeHtml(item.notes)}</span>`:''}
      </div>
    </div>
    <div class="item-right">
      <button class="priority-btn ${priorityClass}" onclick="togglePriority('${item._key}')" title="點擊切換優先級">${priorityLabel}</button>
      <select class="status-select" data-status="${escapeHtml(item.status)}"
        onchange="updateStatus('${item._key}',this.value);this.setAttribute('data-status',this.value)">${opts}</select>
      <button class="delete-btn" onclick="deleteItem('${item._key}')" title="刪除">✕</button>
    </div>
  </div>`;
}

function renderTripSelects(selectedId){
  const opts='<option value="">— 選擇旅程 —</option>'+Object.entries(trips).map(([k,v])=>`<option value="${k}"${k===selectedId?' selected':''}>${escapeHtml(v.name)}</option>`).join('');
  document.getElementById('trip-select-home').innerHTML=opts;
  document.getElementById('trip-select-board').innerHTML=opts;
}

window.onTripChange=function(val){
  currentTripId=val||null;
  document.getElementById('trip-select-home').value=val;
  document.getElementById('trip-select-board').value=val;
  document.getElementById('delete-trip-btn').style.display=val?'':'none';
  currentFilter='all';
  document.querySelectorAll('.filter-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  render();
};

window.setFilter=function(f,btn){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();};
window.toggleAddPanel=function(){const p=document.getElementById('add-panel');p.classList.toggle('open');if(p.classList.contains('open'))setTimeout(()=>document.getElementById('new-name').focus(),50);};

window.openTripModal=function(){
  document.getElementById('trip-modal').classList.add('open');
  setTimeout(()=>{const input=document.getElementById('modal-trip-name');input.focus();if(!input._bound){input._bound=true;let c=false;input.addEventListener('compositionstart',()=>c=true);input.addEventListener('compositionend',()=>c=false);input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!c){e.preventDefault();createTrip();}});}},100);
};
window.closeTripModal=function(){document.getElementById('trip-modal').classList.remove('open');document.getElementById('modal-trip-name').value='';document.getElementById('modal-start').value='';document.getElementById('modal-end').value='';};
window.closeTripModalOnOverlay=function(e){if(e.target===document.getElementById('trip-modal'))closeTripModal();};

let parsedPreviewItems=[],selectedPreviewIds=new Set();
window.openAiModal=function(){if(!currentTripId)return;document.getElementById('ai-key-input').value=localStorage.getItem(AI_KEY_STORE)||'';document.getElementById('ai-paste-input').value='';document.getElementById('ai-modal-error').innerHTML='';document.getElementById('ai-modal').classList.add('open');setTimeout(()=>document.getElementById('ai-paste-input').focus(),100);};
window.closeAiModal=function(){const t=document.getElementById('ai-paste-input').value.trim();if(t&&!confirm('還有未解析的內容，確定要離開嗎？'))return;document.getElementById('ai-modal').classList.remove('open');};
function closeAiModalForce(){document.getElementById('ai-modal').classList.remove('open');}
window.closeAiModalOnOverlay=function(e){if(e.target===document.getElementById('ai-modal'))closeAiModal();};
window.openPreviewModal=function(){document.getElementById('preview-loading').style.display='';document.getElementById('preview-result').style.display='none';document.getElementById('preview-modal').classList.add('open');};
window.closePreviewModal=function(){document.getElementById('preview-modal').classList.remove('open');};
window.closePreviewModalOnOverlay=function(e){if(e.target===document.getElementById('preview-modal'))closePreviewModal();};

window.runAiParse=async function(){
  const text=document.getElementById('ai-paste-input').value.trim(),key=document.getElementById('ai-key-input').value.trim(),errEl=document.getElementById('ai-modal-error');
  errEl.innerHTML='';
  if(!text){errEl.innerHTML='<div class="ai-error">請先貼入行程文字。</div>';return;}
  if(!key){errEl.innerHTML='<div class="ai-error">請輸入 Gemini API Key。</div>';return;}
  localStorage.setItem(AI_KEY_STORE,key);closeAiModalForce();openPreviewModal();
  const trip=trips[currentTripId];
  const ctx=trip?'旅程名稱：'+trip.name+'，出發日：'+(trip.startDate||'不明')+'，回程日：'+(trip.endDate||'不明'):'旅程資訊不明';
  const prompt='你是旅遊行程解析助理。從使用者貼入的非結構化文字中提取行程項目，回傳 JSON 陣列。\n\n每個項目格式：\n{"name":"項目名稱","day":1,"category":"餐廳","status":"候選","notes":"備註"}\n\ncategory 只能是：餐廳、景點、交通、住宿、其他\nstatus 判斷：已訂位/有確認號→已確認；等回覆/pending→等回覆；要訂/還沒訂→跟進中；想去/考慮→候選；已選但未行動→選定\n\n只回傳純 JSON 陣列，不加任何說明或 markdown。\n\n旅程背景：'+ctx+'\n\n以下是行程文字：\n\n'+text;
  try{
    const res=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+encodeURIComponent(key),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0,responseMimeType:'application/json'}})});
    if(!res.ok){const b=await res.json().catch(()=>({}));throw new Error((b.error&&b.error.message)||'API 錯誤 '+res.status);}
    const data=await res.json();
    const raw=((data.candidates?.[0]?.content?.parts?.[0]?.text)||'').replace(/```json|```/g,'').trim();
    let parsed;try{parsed=JSON.parse(raw);}catch(e){throw new Error('AI 回傳格式無法解析。');}
    if(!Array.isArray(parsed)||parsed.length===0)throw new Error('AI 未解析出任何項目。');
    parsedPreviewItems=parsed.map((p,i)=>({_pid:i,name:String(p.name||'未命名'),day:parseInt(p.day)||1,category:VALID_CATS.includes(p.category)?p.category:'其他',status:STATUSES.includes(p.status)?p.status:'候選',notes:String(p.notes||'')}));
    selectedPreviewIds=new Set(parsedPreviewItems.map(p=>p._pid));renderPreview();
  }catch(err){
    document.getElementById('preview-loading').style.display='none';document.getElementById('preview-result').style.display='';
    document.getElementById('preview-list').innerHTML='';document.getElementById('preview-error').innerHTML='<div class="ai-error">⚠ '+escapeHtml(err.message)+'</div>';document.getElementById('preview-count').textContent='';
  }
};

function renderPreview(){
  document.getElementById('preview-loading').style.display='none';document.getElementById('preview-result').style.display='';document.getElementById('preview-error').innerHTML='';
  document.getElementById('preview-count').textContent='共解析出 '+parsedPreviewItems.length+' 個項目';
  document.getElementById('preview-list').innerHTML=parsedPreviewItems.map(p=>{const sel=selectedPreviewIds.has(p._pid);const notesHtml=p.notes?`<div class="preview-notes">${escapeHtml(p.notes)}</div>`:'';return `<div class="preview-item${sel?' selected':''}" onclick="togglePreviewItem(${p._pid})"><div class="preview-check"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5L4.5 7.5L8.5 2.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="preview-body"><div class="preview-name">${escapeHtml(p.name)}</div><div class="preview-meta">Day ${p.day} · ${escapeHtml(p.category)}</div>${notesHtml}</div><span class="preview-status-badge badge-${p.status}">${escapeHtml(p.status)}</span></div>`;}).join('');
}
window.togglePreviewItem=function(pid){if(selectedPreviewIds.has(pid))selectedPreviewIds.delete(pid);else selectedPreviewIds.add(pid);renderPreview();};
window.toggleSelectAll=function(){if(selectedPreviewIds.size===parsedPreviewItems.length)selectedPreviewIds.clear();else selectedPreviewIds=new Set(parsedPreviewItems.map(p=>p._pid));renderPreview();};
window.confirmImport=function(){
  if(selectedPreviewIds.size===0){document.getElementById('preview-error').innerHTML='<div class="ai-error">請至少選取一個項目。</div>';return;}
  const toImport=parsedPreviewItems.filter(p=>selectedPreviewIds.has(p._pid));
  setSyncStatus('syncing');
  // AI 匯入的項目預設 priority 為「必須」
  toImport.forEach(p=>{let maxOrder=0;Object.values(items).forEach(i=>{if(i.tripId===currentTripId&&i.day===p.day)maxOrder=Math.max(maxOrder,(i.order||0)+1);});push(ref(db,'items'),{tripId:currentTripId,day:p.day,name:p.name,category:p.category,status:p.status,notes:p.notes,priority:'必須',order:maxOrder});});
  closePreviewModal();
};

// Inline 編輯名稱
window.startEditName=function(k,el){
  const cur=el.textContent,input=document.createElement('input');
  input.className='inline-input';input.value=cur;el.replaceWith(input);
  input.focus();input.select();let c=false;
  input.addEventListener('compositionstart',()=>c=true);input.addEventListener('compositionend',()=>c=false);
  function save(){const val=input.value.trim()||cur;if(val!==cur){setSyncStatus('syncing');update(ref(db,'items/'+k),{name:val});}const div=document.createElement('div');div.className='item-name';div.textContent=val;div.addEventListener('click',()=>startEditName(k,div));input.replaceWith(div);}
  input.addEventListener('blur',save);input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!c){e.preventDefault();input.blur();}if(e.key==='Escape'){input.value=cur;input.blur();}});
};

function escapeHtml(str){return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeTripModal();closeAiModal();closePreviewModal();}});
setSyncStatus('connecting');
render();
</script>
</body>
