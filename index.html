<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scout — 行前確認</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sage-50:#EAF2ED; --sage-200:#C2DDD1; --sage-400:#8AB8A0;
  --sage-600:#5C8C72; --sage-800:#3D6B54; --sage-900:#2A4D3A;
  --linen-50:#F5F0EA; --linen-200:#DCD8D0; --linen-400:#A8A298;
  --linen-700:#6B6558; --linen-900:#3C3830;
  --wheat-50:#FBF0E0; --wheat-200:#E8C898; --wheat-400:#C4915A; --wheat-700:#7A5230;
  --font-sans:'Noto Sans TC',sans-serif;
  --font-serif:'Noto Serif TC',sans-serif;
}
body { background:var(--linen-50); font-family:var(--font-sans); color:var(--linen-900); min-height:100vh; }

/* ── 同步狀態 ── */
.sync-bar { position:fixed; top:0; left:0; right:0; height:3px; z-index:999; background:transparent; transition:background 0.3s; }
.sync-bar.syncing { background:var(--sage-400); animation:syncPulse 1s ease-in-out infinite; }
.sync-bar.error   { background:#e74c3c; }
@keyframes syncPulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.sync-badge {
  position:fixed; bottom:1.25rem; right:1.25rem; z-index:200;
  background:#fff; border:0.5px solid var(--linen-200); border-radius:100px;
  padding:5px 12px; font-size:11px; color:var(--linen-400);
  box-shadow:0 2px 8px rgba(0,0,0,0.08); display:flex; align-items:center; gap:6px;
  transition:all 0.3s;
}
.sync-dot { width:6px; height:6px; border-radius:50%; background:var(--linen-200); transition:background 0.3s; }
.sync-badge.live    .sync-dot { background:var(--sage-800); }
.sync-badge.syncing .sync-dot { background:var(--wheat-400); animation:syncPulse 0.8s ease-in-out infinite; }
.sync-badge.error   .sync-dot { background:#e74c3c; }

/* ── Header（單列，壓縮）── */
.header {
  background:var(--linen-50);
  border-bottom:0.5px solid var(--linen-200);
  padding:10px 16px;
  position:sticky; top:0; z-index:100;
  display:flex; align-items:center; gap:10px;
}
.brand-logo {
  width:30px; height:30px; border:2px solid var(--sage-800); border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0;
}
.brand-name { font-size:16px; color:var(--linen-900); font-family:var(--font-serif); flex-shrink:0; }

/* 旅程選擇器 pill */
.trip-select {
  flex:1; min-width:0;
  border:1.5px solid var(--sage-400); border-radius:100px;
  padding:5px 28px 5px 12px; font-size:12px;
  font-family:var(--font-sans); color:var(--linen-900);
  background:#fff; outline:none; appearance:none; cursor:pointer;
  background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%238AB8A0' stroke-width='1.2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat:no-repeat; background-position:right 10px center;
  transition:border-color 0.15s;
}
.trip-select:focus { border-color:var(--sage-800); }

/* 未確認徽章 */
.pending-badge {
  flex-shrink:0;
  background:var(--wheat-50); border:1.5px solid var(--wheat-200); border-radius:100px;
  padding:3px 10px; display:flex; align-items:center; gap:3px;
  transition:all 0.3s;
}
.pending-badge-num { font-size:14px; font-weight:700; color:var(--wheat-700); font-family:var(--font-serif); line-height:1; }
.pending-badge-lbl { font-size:10px; color:var(--wheat-400); }
.pending-badge.clear { background:var(--sage-50); border-color:var(--sage-200); }
.pending-badge.clear .pending-badge-num { color:var(--sage-800); }
.pending-badge.clear .pending-badge-lbl { color:var(--sage-600); }

/* 圓形新增按鈕 */
.add-btn {
  width:30px; height:30px; border-radius:50%;
  background:var(--sage-800); border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  color:#fff; font-size:18px; line-height:1; transition:background 0.15s;
}
.add-btn:hover { background:var(--sage-900); }

/* AI 匯入按鈕（小） */
.ai-btn {
  flex-shrink:0; border-radius:100px; padding:4px 10px;
  font-size:11px; font-family:var(--font-sans); cursor:pointer;
  background:transparent; border:1px solid var(--linen-200); color:var(--linen-400);
  transition:all 0.15s; display:none;
}
.ai-btn:hover { color:var(--linen-900); border-color:var(--linen-400); }

/* ── Filter 列 ── */
.filter-bar {
  display:flex; gap:6px; padding:8px 16px;
  overflow-x:auto; scrollbar-width:none;
  border-bottom:0.5px solid var(--linen-200);
  background:#fff; position:sticky; top:50px; z-index:99;
}
.filter-bar::-webkit-scrollbar { display:none; }
.filter-btn {
  flex-shrink:0; border-radius:100px; padding:4px 12px;
  font-size:11px; font-family:var(--font-sans); cursor:pointer;
  border:1.5px solid var(--linen-200); background:#fff; color:var(--linen-700);
  white-space:nowrap; transition:all 0.15s;
}
.filter-btn:hover { border-color:var(--sage-400); color:var(--sage-800); }
.filter-btn.active { background:var(--sage-800); border-color:var(--sage-800); color:#fff; }

/* ── 新增表單（收合式）── */
.add-panel {
  display:none; background:#fff;
  border-bottom:0.5px solid var(--linen-200);
  padding:14px 16px;
}
.add-panel.open { display:block; }
.add-panel-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.add-panel-title { font-size:13px; font-weight:500; color:var(--linen-700); }
.add-panel-close { background:none; border:none; cursor:pointer; font-size:16px; color:var(--linen-400); line-height:1; padding:0 4px; }
.form-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
.form-field { display:flex; flex-direction:column; gap:3px; flex:1; min-width:100px; }
.form-label { font-size:10px; color:var(--linen-400); letter-spacing:0.06em; text-transform:uppercase; }
.form-input {
  border:1.5px solid var(--sage-400); border-radius:100px;
  padding:7px 14px; font-size:13px; font-family:var(--font-sans);
  color:var(--linen-900); background:#fff; outline:none; width:100%;
  transition:border-color 0.15s;
}
.form-input:focus { border-color:var(--sage-800); box-shadow:0 0 0 2px rgba(61,107,84,0.10); }
.form-select {
  border:1.5px solid var(--sage-400); border-radius:100px;
  padding:7px 30px 7px 14px; font-size:13px; font-family:var(--font-sans);
  color:var(--linen-900); background:#fff; outline:none; appearance:none; cursor:pointer; width:100%;
  background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%238AB8A0' stroke-width='1.2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat:no-repeat; background-position:right 10px center;
  transition:border-color 0.15s;
}
.form-select:focus { border-color:var(--sage-800); }
.form-submit-row { display:flex; justify-content:flex-end; margin-top:4px; }
.btn-primary {
  display:inline-flex; align-items:center; gap:8px;
  border-radius:100px; padding:8px 8px 8px 18px;
  font-size:13px; font-family:var(--font-sans);
  cursor:pointer; border:none; background:var(--sage-800); color:#fff;
  transition:background 0.15s;
}
.btn-primary:hover { background:var(--sage-900); }
.icon-circle { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; background:var(--sage-50); }

/* ── Kanban 看板主體 ── */
.board-wrap {
  padding:16px;
  overflow-x:auto;
}

/* 每組 4 欄，第 5 天換行 */
.board-group {
  display:grid;
  grid-template-columns:repeat(4, minmax(0, 1fr));
  gap:12px;
  margin-bottom:12px;
}

/* 每一天的欄位 */
.day-col { display:flex; flex-direction:column; gap:8px; }

/* Day 欄位標題 */
.day-header {
  display:flex; align-items:center; gap:6px;
  padding-bottom:8px;
  border-bottom:0.5px solid var(--linen-200);
}
.day-dot { width:8px; height:8px; border-radius:50%; background:var(--sage-400); flex-shrink:0; }
.day-dot.has-pending { background:var(--wheat-400); }
.day-dot.all-clear   { background:var(--sage-800); }
.day-title { font-size:12px; font-weight:500; color:var(--linen-700); letter-spacing:0.04em; }
.day-count { font-size:10px; color:var(--linen-400); margin-left:auto; }
.day-count.has-pending { color:var(--wheat-400); }

/* 項目卡片 */
.item-card {
  background:#fff; border:0.5px solid var(--linen-200); border-radius:12px;
  padding:10px 12px; display:flex; flex-direction:column; gap:4px;
  position:relative; overflow:hidden;
  transition:border-color 0.2s, box-shadow 0.2s;
  animation:slideIn 0.18s ease both; cursor:default;
}
.item-card::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
}
.item-card[data-status="候選"]::before   { background:var(--linen-400); }
.item-card[data-status="選定"]::before   { background:var(--wheat-400); }
.item-card[data-status="跟進中"]::before { background:var(--sage-400); }
.item-card[data-status="等回覆"]::before { background:var(--wheat-700); }
.item-card[data-status="已確認"]::before { background:var(--sage-800); }
.item-card:hover { border-color:var(--sage-200); box-shadow:0 4px 12px rgba(61,107,84,0.08); }
.item-card.confirmed { opacity:0.5; }
.item-card.confirmed:hover { opacity:0.8; }

.item-card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:6px; }
.item-name {
  font-size:13px; font-weight:500; color:var(--linen-900);
  flex:1; min-width:0; line-height:1.4;
  word-break:break-all;
}
.item-name:hover { background:var(--linen-50); border-radius:4px; cursor:text; outline:1.5px dashed var(--linen-200); outline-offset:2px; }

/* 狀態下拉 */
.status-select {
  border:1.5px solid var(--linen-200); border-radius:100px;
  padding:2px 20px 2px 8px; font-size:10px; font-family:var(--font-sans);
  color:var(--linen-700); background:var(--linen-50); outline:none; appearance:none; cursor:pointer;
  background-image:url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 8 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L4 4L7 1' stroke='%23A8A298' stroke-width='1' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat:no-repeat; background-position:right 7px center;
  flex-shrink:0; transition:all 0.15s;
}
.status-select[data-status="候選"]   { background-color:var(--linen-50);  color:var(--linen-400);  border-color:var(--linen-200); }
.status-select[data-status="選定"]   { background-color:var(--wheat-50);  color:var(--wheat-700);  border-color:var(--wheat-200); }
.status-select[data-status="跟進中"] { background-color:var(--sage-50);   color:var(--sage-800);   border-color:var(--sage-200); }
.status-select[data-status="等回覆"] { background-color:var(--wheat-50);  color:var(--wheat-700);  border-color:var(--wheat-400); }
.status-select[data-status="已確認"] { background-color:var(--sage-50);   color:var(--sage-800);   border-color:var(--sage-800); }

.item-card-bottom { display:flex; align-items:center; justify-content:space-between; gap:4px; }
.cat-tag {
  display:inline-block; font-size:10px; color:var(--linen-400);
  background:var(--linen-50); border:0.5px solid var(--linen-200);
  border-radius:4px; padding:1px 6px; letter-spacing:0.02em;
}
.item-notes {
  font-size:11px; color:var(--linen-700); font-style:italic;
  line-height:1.4; margin-top:2px;
}
.item-notes-empty {
  font-size:11px; color:var(--linen-200); font-style:italic; margin-top:2px; cursor:text;
}
.item-notes-empty:hover { color:var(--linen-400); }
.item-notes:hover { background:var(--linen-50); border-radius:4px; cursor:text; outline:1.5px dashed var(--linen-200); outline-offset:2px; }

.delete-btn {
  background:none; border:none; cursor:pointer;
  font-size:11px; color:var(--linen-200); padding:0 2px;
  transition:color 0.15s; flex-shrink:0; line-height:1;
}
.delete-btn:hover { color:var(--linen-400); }

/* inline 編輯 */
.inline-input {
  font-family:var(--font-sans); font-size:13px; font-weight:500;
  color:var(--linen-900); background:var(--sage-50);
  border:1.5px solid var(--sage-400); border-radius:6px;
  padding:2px 6px; outline:none; width:100%;
}
.inline-input.notes { font-size:11px; font-weight:400; font-style:italic; color:var(--linen-700); }

/* Drag */
.item-card.dragging { opacity:0.3; box-shadow:none; }
.drop-indicator { height:2px; border-radius:2px; background:transparent; margin:1px 0; pointer-events:none; transition:background 0.1s; }
.drop-indicator.active { background:var(--sage-400); }

/* ── Empty states ── */
.empty-state { text-align:center; padding:3rem 1rem; color:var(--linen-400); }
.empty-state-icon { font-size:2.5rem; margin-bottom:1rem; }
.empty-state-text { font-size:14px; font-style:italic; font-family:var(--font-serif); }

/* 欄位內的空狀態 */
.col-empty { text-align:center; padding:1.5rem 0.5rem; color:var(--linen-200); font-size:11px; font-style:italic; }

/* ── Modal ── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(60,56,48,0.45); z-index:200;
  display:flex; align-items:center; justify-content:center; padding:1rem;
  opacity:0; pointer-events:none; transition:opacity 0.2s;
}
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal {
  background:#fff; border-radius:20px; padding:1.75rem; width:100%; max-width:420px;
  transform:translateY(10px); transition:transform 0.2s;
}
.modal-overlay.open .modal { transform:translateY(0); }
.modal-title { font-size:20px; font-family:var(--font-serif); color:var(--linen-900); margin-bottom:1.25rem; }
.modal-actions { display:flex; gap:8px; margin-top:1.25rem; justify-content:flex-end; }
.btn-ghost {
  background:transparent; color:var(--linen-400); border:1px solid var(--linen-200);
  border-radius:100px; padding:7px 16px; font-size:12px; font-family:var(--font-sans); cursor:pointer;
  transition:all 0.15s;
}
.btn-ghost:hover { color:var(--linen-900); border-color:var(--linen-400); }

/* ── AI Modal ── */
.ai-modal { max-width:520px; }
.ai-textarea {
  width:100%; border:1.5px solid var(--sage-400); border-radius:14px;
  padding:12px 14px; font-size:13px; font-family:var(--font-sans);
  color:var(--linen-900); background:#fff; outline:none; resize:vertical;
  min-height:130px; line-height:1.7; transition:border-color 0.15s;
}
.ai-textarea:focus { border-color:var(--sage-800); box-shadow:0 0 0 2px rgba(61,107,84,0.10); }
.ai-textarea::placeholder { color:var(--linen-400); }
.ai-key-row { display:flex; align-items:center; gap:8px; margin-top:8px; }
.ai-key-label { font-size:10px; color:var(--linen-400); white-space:nowrap; letter-spacing:0.05em; text-transform:uppercase; }
.ai-key-input {
  flex:1; border:1.5px solid var(--linen-200); border-radius:100px;
  padding:6px 12px; font-size:12px; font-family:monospace;
  color:var(--linen-700); background:var(--linen-50); outline:none; transition:border-color 0.15s;
}
.ai-key-input:focus { border-color:var(--sage-400); }
.ai-loading { display:flex; flex-direction:column; align-items:center; gap:1rem; padding:2rem 0; }
.ai-spinner { width:28px; height:28px; border:2.5px solid var(--sage-200); border-top-color:var(--sage-800); border-radius:50%; animation:spin 0.7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.ai-loading-text { font-size:13px; font-style:italic; color:var(--linen-400); font-family:var(--font-serif); }
.ai-error { background:#fff3f3; border:1px solid #f0c0c0; border-radius:10px; padding:10px 14px; font-size:12px; color:#c0392b; margin:1rem 0; }

/* Preview */
.preview-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
.preview-count  { font-size:12px; color:var(--linen-400); }
.preview-select-all { font-size:12px; color:var(--sage-800); cursor:pointer; text-decoration:underline; background:none; border:none; padding:0; font-family:var(--font-sans); }
.preview-list { display:flex; flex-direction:column; gap:6px; margin:0.75rem 0; max-height:300px; overflow-y:auto; }
.preview-item { display:flex; align-items:flex-start; gap:8px; background:var(--linen-50); border:0.5px solid var(--linen-200); border-radius:10px; padding:8px 12px; cursor:pointer; transition:all 0.15s; }
.preview-item.selected { background:var(--sage-50); border-color:var(--sage-400); }
.preview-check { width:16px; height:16px; border-radius:50%; border:1.5px solid var(--linen-200); flex-shrink:0; margin-top:2px; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
.preview-item.selected .preview-check { background:var(--sage-800); border-color:var(--sage-800); }
.preview-check svg { display:none; }
.preview-item.selected .preview-check svg { display:block; }
.preview-body { flex:1; min-width:0; }
.preview-name  { font-size:13px; font-weight:500; color:var(--linen-900); margin-bottom:1px; }
.preview-meta  { font-size:11px; color:var(--linen-400); }
.preview-notes { font-size:11px; font-style:italic; color:var(--linen-700); margin-top:2px; }
.preview-status-badge { font-size:10px; border-radius:100px; padding:2px 8px; white-space:nowrap; flex-shrink:0; }
.badge-候選   { background:var(--linen-200); color:var(--linen-700); }
.badge-選定   { background:var(--wheat-50); color:var(--wheat-700); border:1px solid var(--wheat-200); }
.badge-跟進中 { background:var(--sage-50); color:var(--sage-800); border:1px solid var(--sage-200); }
.badge-等回覆 { background:var(--wheat-50); color:var(--wheat-700); border:1px solid var(--wheat-400); }
.badge-已確認 { background:var(--sage-50); color:var(--sage-800); border:1px solid var(--sage-800); }

@keyframes slideIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

/* ── 手機版 ── */
@media (max-width:600px) {
  .board-group { grid-template-columns:1fr; gap:0; }
  .day-col { margin-bottom:1.5rem; }
  .filter-bar { top:50px; }
  .brand-name { display:none; }
}
@media (min-width:601px) and (max-width:900px) {
  .board-group { grid-template-columns:repeat(2, minmax(0,1fr)); }
}
</style>
</head>
<body>

<!-- 同步狀態 -->
<div class="sync-bar" id="sync-bar"></div>
<div class="sync-badge" id="sync-badge">
  <div class="sync-dot"></div>
  <span id="sync-label">連線中…</span>
</div>

<!-- ── Header（單列）── -->
<header class="header">
  <div class="brand-logo">🔍</div>
  <span class="brand-name">Scout</span>
  <select class="trip-select" id="trip-select" onchange="onTripChange()">
    <option value="">— 選擇旅程 —</option>
  </select>
  <div class="pending-badge" id="pending-badge" style="display:none">
    <span class="pending-badge-num" id="pending-num">0</span>
    <span class="pending-badge-lbl">未確認</span>
  </div>
  <button class="ai-btn" id="ai-import-btn" onclick="openAiModal()">✦ AI</button>
  <button class="add-btn" id="add-btn" onclick="toggleAddPanel()" title="新增項目">＋</button>
</header>

<!-- ── Filter 列 ── -->
<div class="filter-bar" id="filter-bar" style="display:none">
  <button class="filter-btn active" onclick="setFilter('all',this)">全部</button>
  <button class="filter-btn" onclick="setFilter('未確認',this)">未確認</button>
  <button class="filter-btn" onclick="setFilter('餐廳',this)">餐廳</button>
  <button class="filter-btn" onclick="setFilter('景點',this)">景點</button>
  <button class="filter-btn" onclick="setFilter('交通',this)">交通</button>
  <button class="filter-btn" onclick="setFilter('住宿',this)">住宿</button>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js';
import { getDatabase, ref, set, push, remove, onValue, update } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyAXzF_wiFJBzBy8vh-clfWK2AIZ1uCR5vg",
  authDomain: "scout-checklist.firebaseapp.com",
  databaseURL: "https://scout-checklist-default-rtdb.firebaseio.com",
  projectId: "scout-checklist",
  storageBucket: "scout-checklist.firebasestorage.app",
  messagingSenderId: "441876091472",
  appId: "1:441876091472:web:29e20124a5a40493417755"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const STATUSES         = ['候選','選定','跟進中','等回覆','已確認'];
const PENDING_STATUSES = new Set(['候選','選定','跟進中','等回覆']);
const VALID_CATS       = ['餐廳','景點','交通','住宿','其他'];
const AI_KEY_STORE     = 'scout_ai_key';

let trips         = {};
let items         = {};
let currentTripId = null;
let currentFilter = 'all';

// ── 同步狀態 ──
function setSyncStatus(status) {
  const bar   = document.getElementById('sync-bar');
  const badge = document.getElementById('sync-badge');
  const label = document.getElementById('sync-label');
  bar.className   = 'sync-bar'   + (status==='syncing'?' syncing':status==='error'?' error':'');
  badge.className = 'sync-badge' + (status==='live'?' live':status==='syncing'?' syncing':status==='error'?' error':'');
  label.textContent = status==='live'?'即時同步':status==='syncing'?'同步中…':status==='error'?'連線失敗':'連線中…';
}

// ── Firebase 監聽 ──
onValue(ref(db,'trips'), snap => {
  trips = snap.val() || {};
  renderTripSelect(currentTripId);
  render();
  setSyncStatus('live');
}, err => { setSyncStatus('error'); console.error(err); });

onValue(ref(db,'items'), snap => {
  items = snap.val() || {};
  render();
}, err => console.error(err));

// ── 旅程 CRUD ──
window.createTrip = function() {
  const name  = document.getElementById('modal-trip-name').value.trim();
  const start = document.getElementById('modal-start').value;
  const end   = document.getElementById('modal-end').value;
  if (!name) { alert('請輸入旅程名稱'); return; }
  setSyncStatus('syncing');
  const newRef = push(ref(db,'trips'));
  set(newRef, { name, startDate:start, endDate:end }).then(() => {
    closeTripModal();
    currentTripId = newRef.key;
    setSyncStatus('live');
  });
};

window.deleteCurrentTrip = function() {
  if (!currentTripId) return;
  const trip = trips[currentTripId];
  if (!trip) return;
  if (!confirm('確定要刪除「'+trip.name+'」？')) return;
  setSyncStatus('syncing');
  Object.keys(items).forEach(k => { if(items[k].tripId===currentTripId) remove(ref(db,'items/'+k)); });
  remove(ref(db,'trips/'+currentTripId)).then(() => { currentTripId=null; setSyncStatus('live'); });
};

// ── 項目 CRUD ──
window.addItem = function() {
  if (!currentTripId) { openTripModal(); return; }
  const name     = document.getElementById('new-name').value.trim();
  const day      = parseInt(document.getElementById('new-day').value) || 1;
  const category = document.getElementById('new-category').value;
  const status   = document.getElementById('new-status').value;
  const notes    = document.getElementById('new-notes').value.trim();
  if (!name) { alert('請輸入項目名稱'); return; }
  let maxOrder = 0;
  Object.values(items).forEach(i => { if(i.tripId===currentTripId&&i.day===day) maxOrder=Math.max(maxOrder,(i.order||0)+1); });
  setSyncStatus('syncing');
  push(ref(db,'items'), { tripId:currentTripId, day, name, category, status, notes, order:maxOrder });
  document.getElementById('new-name').value  = '';
  document.getElementById('new-notes').value = '';
};

window.updateStatus = function(itemKey, newStatus) {
  setSyncStatus('syncing');
  update(ref(db,'items/'+itemKey), { status:newStatus });
  const card = document.querySelector('.item-card[data-id="'+itemKey+'"]');
  if (card) {
    card.setAttribute('data-status', newStatus);
    card.classList.toggle('confirmed', newStatus==='已確認');
    const sel = card.querySelector('.status-select');
    if (sel) sel.setAttribute('data-status', newStatus);
  }
};

window.deleteItem = function(itemKey) {
  setSyncStatus('syncing');
  const card = document.querySelector('.item-card[data-id="'+itemKey+'"]');
  if (card) { card.style.transition='opacity 0.2s'; card.style.opacity='0'; }
  setTimeout(() => remove(ref(db,'items/'+itemKey)), 180);
};

// ── 主 Render（Kanban 看板）──
window.render = function() {
  const hasTripSelected = !!currentTripId;
  document.getElementById('no-trip-state').style.display  = hasTripSelected ? 'none' : '';
  document.getElementById('filter-bar').style.display     = hasTripSelected ? '' : 'none';
  document.getElementById('ai-import-btn').style.display  = hasTripSelected ? '' : 'none';
  document.getElementById('pending-badge').style.display  = hasTripSelected ? '' : 'none';

  if (!hasTripSelected) {
    document.getElementById('board-container').innerHTML = '';
    return;
  }

  // 篩出此旅程的項目
  const allItems = Object.entries(items)
    .filter(([,v]) => v.tripId === currentTripId)
    .map(([k,v]) => ({ _key:k, ...v }));

  // 更新未確認徽章
  const pendingCount = allItems.filter(i => PENDING_STATUSES.has(i.status)).length;
  const badge = document.getElementById('pending-badge');
  document.getElementById('pending-num').textContent = pendingCount;
  badge.classList.toggle('clear', pendingCount === 0 && allItems.length > 0);
  const lbl = badge.querySelector('.pending-badge-lbl');
  lbl.textContent = (pendingCount === 0 && allItems.length > 0) ? '全確認 ✓' : '未確認';

  // 過濾
  let filtered = allItems;
  if (currentFilter === '未確認') filtered = allItems.filter(i => PENDING_STATUSES.has(i.status));
  else if (currentFilter !== 'all') filtered = allItems.filter(i => i.category === currentFilter);

  if (allItems.length === 0) {
    document.getElementById('board-container').innerHTML =
      '<div class="empty-state"><div class="empty-state-icon">🗺️</div><div class="empty-state-text">還沒有行程項目<br>點右上角「＋」新增</div></div>';
    return;
  }

  // 取得所有天數（依原始資料，不只是過濾後）
  const allDays = [...new Set(allItems.map(i => i.day))].sort((a,b) => a-b);

  // 依 Day 分組過濾後的項目
  const byDay = {};
  filtered.forEach(item => {
    if (!byDay[item.day]) byDay[item.day] = [];
    byDay[item.day].push(item);
  });
  allDays.forEach(d => {
    if (!byDay[d]) byDay[d] = [];
    byDay[d].sort((a,b) => (a.order||0)-(b.order||0));
  });

  // 每 4 天一組
  const groups = [];
  for (let i = 0; i < allDays.length; i += 4) groups.push(allDays.slice(i, i+4));

  document.getElementById('board-container').innerHTML = groups.map(group => {
    const cols = group.map(day => {
      const dayItems  = byDay[day] || [];
      const allDay    = allItems.filter(i => i.day === day);
      const pending   = allDay.filter(i => PENDING_STATUSES.has(i.status)).length;
      const dotClass  = pending > 0 ? 'has-pending' : allDay.length > 0 ? 'all-clear' : '';
      const countText = pending > 0 ? pending+' 未確認' : allDay.length > 0 ? '✓' : '';
      const countClass = pending > 0 ? 'has-pending' : '';

      const cardsHtml = dayItems.length > 0
        ? dayItems.map(renderCard).join('')
        : '<div class="col-empty">無項目</div>';

      return `<div class="day-col" data-day="${day}">
        <div class="day-header">
          <div class="day-dot ${dotClass}"></div>
          <div class="day-title">Day ${day}</div>
          <div class="day-count ${countClass}">${countText}</div>
        </div>
        <div class="items-list" data-day="${day}">${cardsHtml}</div>
      </div>`;
    }).join('');

    return `<div class="board-group">${cols}</div>`;
  }).join('');

  initDragDrop();
};

function renderCard(item) {
  const confirmed = item.status === '已確認';
  const opts = STATUSES.map(s =>
    `<option value="${s}"${s===item.status?' selected':''}>${s}</option>`
  ).join('');
  const notesHtml = item.notes
    ? `<div class="item-notes" onclick="startEditNotes('${item._key}',this)">${escapeHtml(item.notes)}</div>`
    : `<div class="item-notes item-notes-empty" onclick="startEditNotes('${item._key}',this)">＋ 備註</div>`;

  return `<div class="item-card${confirmed?' confirmed':''}" draggable="true"
    data-id="${item._key}" data-day="${item.day}" data-order="${item.order||0}" data-status="${escapeHtml(item.status)}">
    <div class="item-card-top">
      <div class="item-name" onclick="startEditName('${item._key}',this)">${escapeHtml(item.name)}</div>
      <select class="status-select" data-status="${escapeHtml(item.status)}"
        onchange="updateStatus('${item._key}',this.value);this.setAttribute('data-status',this.value)">${opts}</select>
    </div>
    <div class="item-card-bottom">
      <span class="cat-tag">${escapeHtml(item.category)}</span>
      <button class="delete-btn" onclick="deleteItem('${item._key}')" title="刪除">✕</button>
    </div>
    ${notesHtml}
  </div>`;
}

// ── 旅程選擇器 ──
function renderTripSelect(selectId) {
  const sel = document.getElementById('trip-select');
  sel.innerHTML = '<option value="">— 選擇旅程 —</option>' +
    Object.entries(trips).map(([k,v]) =>
      `<option value="${k}"${k===selectId?' selected':''}>${escapeHtml(v.name)}</option>`
    ).join('') +
    '<option value="__new__">＋ 新增旅程…</option>';
}

window.onTripChange = function() {
  const val = document.getElementById('trip-select').value;
  if (val === '__new__') { openTripModal(); document.getElementById('trip-select').value = currentTripId||''; return; }
  currentTripId = val || null;
  render();
};

// ── Filter ──
window.setFilter = function(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
};

// ── 新增面板 ──
window.toggleAddPanel = function() {
  const panel = document.getElementById('add-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) setTimeout(() => document.getElementById('new-name').focus(), 50);
};

// ── 旅程 Modal ──
window.openTripModal = function() {
  document.getElementById('trip-modal').classList.add('open');
  setTimeout(() => {
    const input = document.getElementById('modal-trip-name');
    input.focus();
    if (!input._bound) {
      input._bound = true;
      let composing = false;
      input.addEventListener('compositionstart', () => composing=true);
      input.addEventListener('compositionend',   () => composing=false);
      input.addEventListener('keydown', e => { if(e.key==='Enter'&&!composing){e.preventDefault();createTrip();} });
    }
  }, 100);
};
window.closeTripModal = function() {
  document.getElementById('trip-modal').classList.remove('open');
  document.getElementById('modal-trip-name').value = '';
  document.getElementById('modal-start').value = '';
  document.getElementById('modal-end').value = '';
};
window.closeTripModalOnOverlay = function(e) { if(e.target===document.getElementById('trip-modal')) closeTripModal(); };

// ── AI 匯入 ──
let parsedPreviewItems = [];
let selectedPreviewIds = new Set();

window.openAiModal = function() {
  if (!currentTripId) return;
  document.getElementById('ai-key-input').value      = localStorage.getItem(AI_KEY_STORE) || '';
  document.getElementById('ai-paste-input').value    = '';
  document.getElementById('ai-modal-error').innerHTML = '';
  document.getElementById('ai-modal').classList.add('open');
  setTimeout(() => document.getElementById('ai-paste-input').focus(), 100);
};
window.closeAiModal = function() {
  const text = document.getElementById('ai-paste-input').value.trim();
  if (text && !confirm('還有未解析的內容，確定要離開嗎？')) return;
  document.getElementById('ai-modal').classList.remove('open');
};
function closeAiModalForce() { document.getElementById('ai-modal').classList.remove('open'); }
window.closeAiModalOnOverlay = function(e) { if(e.target===document.getElementById('ai-modal')) closeAiModal(); };

window.openPreviewModal = function() {
  document.getElementById('preview-loading').style.display = '';
  document.getElementById('preview-result').style.display  = 'none';
  document.getElementById('preview-modal').classList.add('open');
};
window.closePreviewModal  = function() { document.getElementById('preview-modal').classList.remove('open'); };
window.closePreviewModalOnOverlay = function(e) { if(e.target===document.getElementById('preview-modal')) closePreviewModal(); };

window.runAiParse = async function() {
  const text  = document.getElementById('ai-paste-input').value.trim();
  const key   = document.getElementById('ai-key-input').value.trim();
  const errEl = document.getElementById('ai-modal-error');
  errEl.innerHTML = '';
  if (!text) { errEl.innerHTML = '<div class="ai-error">請先貼入行程文字。</div>'; return; }
  if (!key)  { errEl.innerHTML = '<div class="ai-error">請輸入 Gemini API Key（AIza...）。</div>'; return; }
  localStorage.setItem(AI_KEY_STORE, key);
  closeAiModalForce();
  openPreviewModal();

  const trip = trips[currentTripId];
  const ctx  = trip ? '旅程名稱：'+trip.name+'，出發日：'+(trip.startDate||'不明')+'，回程日：'+(trip.endDate||'不明') : '旅程資訊不明';
  const prompt = '你是旅遊行程解析助理。從使用者貼入的非結構化文字中提取行程項目，回傳 JSON 陣列。\n\n每個項目格式：\n{"name":"項目名稱","day":1,"category":"餐廳","status":"候選","notes":"備註"}\n\ncategory 只能是：餐廳、景點、交通、住宿、其他\nstatus 判斷：已訂位/有確認號→已確認；等回覆/pending→等回覆；要訂/還沒訂→跟進中；想去/考慮→候選；已選但未行動→選定\n\n只回傳純 JSON 陣列，不加任何說明或 markdown。\n\n旅程背景：'+ctx+'\n\n以下是行程文字：\n\n'+text;

  try {
    const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+encodeURIComponent(key), {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ contents:[{parts:[{text:prompt}]}], generationConfig:{temperature:0, responseMimeType:'application/json'} })
    });
    if (!res.ok) { const b = await res.json().catch(()=>({})); throw new Error((b.error&&b.error.message)||'API 錯誤 '+res.status); }
    const data = await res.json();
    const raw  = ((data.candidates?.[0]?.content?.parts?.[0]?.text)||'').replace(/```json|```/g,'').trim();
    let parsed;
    try { parsed = JSON.parse(raw); } catch(e) { throw new Error('AI 回傳格式無法解析，請再試一次。'); }
    if (!Array.isArray(parsed)||parsed.length===0) throw new Error('AI 未解析出任何項目。');
    parsedPreviewItems = parsed.map((p,i) => ({
      _pid:i, name:String(p.name||'未命名'), day:parseInt(p.day)||1,
      category:VALID_CATS.includes(p.category)?p.category:'其他',
      status:STATUSES.includes(p.status)?p.status:'候選',
      notes:String(p.notes||'')
    }));
    selectedPreviewIds = new Set(parsedPreviewItems.map(p=>p._pid));
    renderPreview();
  } catch(err) {
    document.getElementById('preview-loading').style.display = 'none';
    document.getElementById('preview-result').style.display  = '';
    document.getElementById('preview-list').innerHTML        = '';
    document.getElementById('preview-error').innerHTML       = '<div class="ai-error">⚠ '+escapeHtml(err.message)+'</div>';
    document.getElementById('preview-count').textContent     = '';
  }
};

function renderPreview() {
  document.getElementById('preview-loading').style.display = 'none';
  document.getElementById('preview-result').style.display  = '';
  document.getElementById('preview-error').innerHTML       = '';
  document.getElementById('preview-count').textContent     = '共解析出 '+parsedPreviewItems.length+' 個項目';
  document.getElementById('preview-list').innerHTML = parsedPreviewItems.map(p => {
    const sel = selectedPreviewIds.has(p._pid);
    const notesHtml = p.notes ? `<div class="preview-notes">${escapeHtml(p.notes)}</div>` : '';
    return `<div class="preview-item${sel?' selected':''}" onclick="togglePreviewItem(${p._pid})">
      <div class="preview-check"><svg width="9" height="9" viewBox="0 0 10 10" fill="none"><path d="M2 5L4.5 7.5L8.5 2.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="preview-body"><div class="preview-name">${escapeHtml(p.name)}</div><div class="preview-meta">Day ${p.day} · ${escapeHtml(p.category)}</div>${notesHtml}</div>
      <span class="preview-status-badge badge-${p.status}">${escapeHtml(p.status)}</span>
    </div>`;
  }).join('');
}

window.togglePreviewItem = function(pid) { if(selectedPreviewIds.has(pid))selectedPreviewIds.delete(pid); else selectedPreviewIds.add(pid); renderPreview(); };
window.toggleSelectAll   = function() { if(selectedPreviewIds.size===parsedPreviewItems.length)selectedPreviewIds.clear(); else selectedPreviewIds=new Set(parsedPreviewItems.map(p=>p._pid)); renderPreview(); };
window.confirmImport = function() {
  if (selectedPreviewIds.size===0) { document.getElementById('preview-error').innerHTML='<div class="ai-error">請至少選取一個項目。</div>'; return; }
  const toImport = parsedPreviewItems.filter(p => selectedPreviewIds.has(p._pid));
  setSyncStatus('syncing');
  toImport.forEach(p => {
    let maxOrder = 0;
    Object.values(items).forEach(i => { if(i.tripId===currentTripId&&i.day===p.day) maxOrder=Math.max(maxOrder,(i.order||0)+1); });
    push(ref(db,'items'), { tripId:currentTripId, day:p.day, name:p.name, category:p.category, status:p.status, notes:p.notes, order:maxOrder });
  });
  closePreviewModal();
};

// ── Inline 編輯 ──
function getCard(el) { let n=el; while(n&&!n.classList.contains('item-card'))n=n.parentNode; return n; }
window.startEditName = function(itemKey, el) {
  const current = el.textContent;
  const input = document.createElement('input');
  input.className='inline-input'; input.value=current;
  el.replaceWith(input);
  const card=getCard(input); if(card)card.setAttribute('draggable','false');
  input.focus(); input.select();
  let composing=false;
  input.addEventListener('compositionstart',()=>composing=true);
  input.addEventListener('compositionend',  ()=>composing=false);
  function save() {
    const card=getCard(input); if(card)card.setAttribute('draggable','true');
    const val = input.value.trim()||current;
    if(val!==current){setSyncStatus('syncing');update(ref(db,'items/'+itemKey),{name:val});}
    const div=document.createElement('div');
    div.className='item-name'; div.title='點擊編輯'; div.textContent=val;
    div.addEventListener('click',()=>startEditName(itemKey,div));
    input.replaceWith(div);
  }
  input.addEventListener('blur',save);
  input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!composing){e.preventDefault();input.blur();}if(e.key==='Escape'){input.value=current;input.blur();}});
};

window.startEditNotes = function(itemKey, el) {
  const item = items[itemKey];
  const current = item?item.notes:'';
  const input = document.createElement('input');
  input.className='inline-input notes'; input.value=current; input.placeholder='新增備註…';
  el.replaceWith(input);
  const card=getCard(input); if(card)card.setAttribute('draggable','false');
  input.focus(); if(current)input.select();
  let composing=false;
  input.addEventListener('compositionstart',()=>composing=true);
  input.addEventListener('compositionend',  ()=>composing=false);
  function save() {
    const card=getCard(input); if(card)card.setAttribute('draggable','true');
    const val=input.value.trim();
    if(val!==current){setSyncStatus('syncing');update(ref(db,'items/'+itemKey),{notes:val});}
    const div=document.createElement('div');
    if(val){div.className='item-notes';div.textContent=val;}
    else{div.className='item-notes item-notes-empty';div.textContent='＋ 備註';}
    div.addEventListener('click',()=>startEditNotes(itemKey,div));
    input.replaceWith(div);
  }
  input.addEventListener('blur',save);
  input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!composing){e.preventDefault();input.blur();}if(e.key==='Escape'){input.value=current;input.blur();}});
};

// ── Drag & Drop ──
let dragSrcKey = null;
function initDragDrop() {
  document.querySelectorAll('.item-card[draggable]').forEach(card => {
    card.addEventListener('dragstart', onDragStart);
    card.addEventListener('dragend',   onDragEnd);
    card.addEventListener('dragover',  onDragOver);
    card.addEventListener('dragleave', onDragLeave);
    card.addEventListener('drop',      onDrop);
  });
  document.querySelectorAll('.items-list').forEach(list => {
    list.addEventListener('dragover',  onListDragOver);
    list.addEventListener('dragleave', onListDragLeave);
    list.addEventListener('drop',      onListDrop);
  });
}
function onDragStart(e) { dragSrcKey=this.getAttribute('data-id'); this.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain',dragSrcKey); }
function onDragEnd()    { this.classList.remove('dragging'); clearIndicators(); dragSrcKey=null; }
function onDragOver(e)  { e.preventDefault(); e.stopPropagation(); if(this.getAttribute('data-id')===dragSrcKey)return; clearIndicators(); const rect=this.getBoundingClientRect(); showIndicator(this,e.clientY<rect.top+rect.height/2?'before':'after'); }
function onDragLeave(e) { if(!this.contains(e.relatedTarget))clearIndicators(); }
function onDrop(e) {
  e.preventDefault(); e.stopPropagation(); clearIndicators(); if(!dragSrcKey)return;
  const targetKey=this.getAttribute('data-id'); if(targetKey===dragSrcKey)return;
  const before=e.clientY<this.getBoundingClientRect().top+this.getBoundingClientRect().height/2;
  dropItem(dragSrcKey,targetKey,before,parseInt(this.getAttribute('data-day')));
}
function onListDragOver(e) { e.preventDefault(); e.stopPropagation(); const last=this.querySelector('.item-card:last-child'); if(last){clearIndicators();showIndicator(last,'after');} }
function onListDragLeave(e) { if(!this.contains(e.relatedTarget))clearIndicators(); }
function onListDrop(e) {
  e.preventDefault(); e.stopPropagation(); clearIndicators(); if(!dragSrcKey)return;
  const targetDay=parseInt(this.getAttribute('data-day'));
  const cards=Array.from(this.querySelectorAll('.item-card'));
  const lastCard=cards[cards.length-1];
  if(lastCard){const lastKey=lastCard.getAttribute('data-id'); if(lastKey!==dragSrcKey)dropItem(dragSrcKey,lastKey,false,targetDay);}
  else{setSyncStatus('syncing');update(ref(db,'items/'+dragSrcKey),{day:targetDay,order:0});}
}
function showIndicator(card,pos) {
  clearIndicators();
  const ind=document.createElement('div'); ind.className='drop-indicator active';
  if(pos==='before')card.parentNode.insertBefore(ind,card); else card.parentNode.insertBefore(ind,card.nextSibling);
}
function clearIndicators() { document.querySelectorAll('.drop-indicator').forEach(el=>el.remove()); }
function dropItem(srcKey,targetKey,insertBefore,targetDay) {
  const dayItems=Object.entries(items)
    .filter(([k,v])=>v.tripId===currentTripId&&k!==srcKey&&v.day===targetDay)
    .map(([k,v])=>({_key:k,order:v.order||0}))
    .sort((a,b)=>a.order-b.order);
  let insertIdx=dayItems.findIndex(i=>i._key===targetKey);
  if(!insertBefore)insertIdx++;
  dayItems.splice(insertIdx,0,{_key:srcKey});
  setSyncStatus('syncing');
  const updates={};
  dayItems.forEach((item,idx)=>{updates['items/'+item._key+'/order']=idx;});
  updates['items/'+srcKey+'/day']=targetDay;
  import('https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js').then(m=>m.update(ref(db),updates));
}

function daysUntil(s) { if(!s)return null; const t=new Date(); t.setHours(0,0,0,0); return Math.round((new Date(s+'T00:00:00')-t)/86400000); }
function escapeHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

document.addEventListener('keydown', e => {
  if(e.key==='Escape'){closeTripModal();closeAiModal();closePreviewModal();}
});

setSyncStatus('connecting');
render();
</script>
</body>
