<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scout — 行前確認</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sage-50:#EAF2ED; --sage-200:#C2DDD1; --sage-400:#8AB8A0;
  --sage-600:#5C8C72; --sage-800:#3D6B54; --sage-900:#2A4D3A;
  --linen-50:#F5F0EA; --linen-200:#DCD8D0; --linen-400:#A8A298;
  --linen-700:#6B6558; --linen-900:#3C3830;
  --wheat-50:#FBF0E0; --wheat-200:#E8C898; --wheat-400:#C4915A; --wheat-700:#7A5230;
  --red-50:#FEF0EE; --red-200:#FACFC8; --red-400:#E07060; --red-600:#C0392B;
  --font-sans:'Noto Sans TC',sans-serif;
}
body { background:var(--linen-50); font-family:var(--font-sans); color:var(--linen-900); min-height:100vh; padding-bottom:5rem; }

/* ── 同步狀態 ── */
.sync-bar { position:fixed; top:0; left:0; right:0; height:3px; z-index:999; background:transparent; transition:background 0.3s; }
.sync-bar.syncing { background:var(--sage-400); animation:pulse 1s ease-in-out infinite; }
.sync-bar.error { background:#e74c3c; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── 底部導覽列 ── */
.bottom-nav { position:fixed; bottom:0; left:0; right:0; z-index:100; background:#fff; border-top:0.5px solid var(--linen-200); display:flex; height:56px; }
.nav-tab { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; cursor:pointer; border:none; background:transparent; color:var(--linen-400); font-family:var(--font-sans); font-size:10px; transition:color 0.15s; padding:0; }
.nav-tab.active { color:var(--sage-800); }
.nav-tab svg { transition:stroke 0.15s; }
.nav-badge { background:var(--red-600); color:#fff; border-radius:100px; font-size:9px; padding:1px 5px; min-width:16px; text-align:center; line-height:1.4; }

/* ── 共用 Header ── */
.app-header { background:var(--linen-50); border-bottom:0.5px solid var(--linen-200); padding:10px 16px; position:sticky; top:0; z-index:90; display:flex; align-items:center; gap:10px; }
.header-logo { width:28px; height:28px; border:2px solid var(--sage-800); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; flex-shrink:0; }
.header-title { font-size:16px; font-weight:500; color:var(--linen-900); }
.header-spacer { flex:1; }

/* 旅程選擇器 */
.trip-select { flex:1; min-width:0; border:1.5px solid var(--sage-400); border-radius:100px; padding:5px 28px 5px 12px; font-size:12px; font-family:var(--font-sans); color:var(--linen-900); background:#fff; outline:none; appearance:none; cursor:pointer; background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%238AB8A0' stroke-width='1.2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat:no-repeat; background-position:right 10px center; }

/* 必須未確認徽章 */
.urgent-badge { flex-shrink:0; background:var(--red-50); border:1.5px solid var(--red-200); border-radius:100px; padding:3px 10px; display:flex; align-items:center; gap:3px; transition:all 0.3s; }
.urgent-badge-num { font-size:13px; font-weight:700; color:var(--red-600); line-height:1; }
.urgent-badge-lbl { font-size:10px; color:var(--red-400); }
.urgent-badge.clear { background:var(--sage-50); border-color:var(--sage-200); }
.urgent-badge.clear .urgent-badge-num { color:var(--sage-800); }
.urgent-badge.clear .urgent-badge-lbl { color:var(--sage-600); }

.ai-btn { flex-shrink:0; border-radius:100px; padding:4px 10px; font-size:11px; font-family:var(--font-sans); cursor:pointer; background:transparent; border:1px solid var(--linen-200); color:var(--linen-400); transition:all 0.15s; }
.ai-btn:hover { color:var(--linen-900); border-color:var(--linen-400); }
.add-btn { width:28px; height:28px; border-radius:50%; background:var(--sage-800); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; color:#fff; font-size:17px; line-height:1; transition:background 0.15s; }
.add-btn:hover { background:var(--sage-900); }

/* ── 視角切換 tab（行程頁）── */
.view-tabs { display:flex; background:#fff; border-bottom:0.5px solid var(--linen-200); padding:0 16px; gap:0; }
.view-tab { flex:1; padding:9px 0; text-align:center; font-size:12px; font-family:var(--font-sans); color:var(--linen-400); cursor:pointer; border:none; background:transparent; border-bottom:2px solid transparent; transition:all 0.15s; }
.view-tab.active { color:var(--sage-800); border-bottom-color:var(--sage-800); font-weight:500; }

/* ── Filter 列 ── */
.filter-bar { display:flex; gap:6px; padding:8px 16px; overflow-x:auto; scrollbar-width:none; border-bottom:0.5px solid var(--linen-200); background:#fff; position:sticky; top:99px; z-index:89; }
.filter-bar::-webkit-scrollbar { display:none; }
.filter-btn { flex-shrink:0; border-radius:100px; padding:4px 12px; font-size:11px; font-family:var(--font-sans); cursor:pointer; border:1.5px solid var(--linen-200); background:#fff; color:var(--linen-700); white-space:nowrap; transition:all 0.15s; }
.filter-btn:hover { border-color:var(--sage-400); color:var(--sage-800); }
.filter-btn.active { background:var(--sage-800); border-color:var(--sage-800); color:#fff; }

/* ── 新增面板 ── */
.add-panel { display:none; background:#fff; border-bottom:0.5px solid var(--linen-200); padding:14px 16px; }
.add-panel.open { display:block; }
.add-panel-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.add-panel-title { font-size:13px; font-weight:500; color:var(--linen-700); }
.add-panel-close { background:none; border:none; cursor:pointer; font-size:16px; color:var(--linen-400); line-height:1; padding:0 4px; }
.form-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
.form-field { display:flex; flex-direction:column; gap:3px; flex:1; min-width:100px; }
.form-label { font-size:10px; color:var(--linen-400); letter-spacing:0.06em; text-transform:uppercase; }
.form-input { border:1.5px solid var(--sage-400); border-radius:100px; padding:7px 14px; font-size:13px; font-family:var(--font-sans); color:var(--linen-900); background:#fff; outline:none; width:100%; transition:border-color 0.15s; }
.form-input:focus { border-color:var(--sage-800); box-shadow:0 0 0 2px rgba(61,107,84,0.10); }
.form-select { border:1.5px solid var(--sage-400); border-radius:100px; padding:7px 30px 7px 14px; font-size:13px; font-family:var(--font-sans); color:var(--linen-900); background:#fff; outline:none; appearance:none; cursor:pointer; width:100%; background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%238AB8A0' stroke-width='1.2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat:no-repeat; background-position:right 10px center; }
.form-submit-row { display:flex; justify-content:flex-end; margin-top:4px; }
.btn-primary { display:inline-flex; align-items:center; gap:8px; border-radius:100px; padding:8px 8px 8px 18px; font-size:13px; font-family:var(--font-sans); cursor:pointer; border:none; background:var(--sage-800); color:#fff; transition:background 0.15s; }
.btn-primary:hover { background:var(--sage-900); }
.icon-circle { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; background:var(--sage-50); }

/* ── 優先級儀表板 ── */
.board-body { padding:12px 16px; }
.section-label { display:flex; align-items:center; gap:8px; padding:8px 2px 6px; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; }
.section-label.urgent   { color:var(--red-600); }
.section-label.flexible { color:var(--wheat-700); }
.section-label.done     { color:var(--linen-400); }
.section-line { flex:1; height:0.5px; }
.section-label.urgent   .section-line { background:var(--red-200); }
.section-label.flexible .section-line { background:var(--wheat-200); }
.section-label.done     .section-line { background:var(--linen-200); }
.items-list { display:flex; flex-direction:column; gap:5px; margin-bottom:4px; }

/* 行程卡片（優先級視角）*/
.item-card { background:#fff; border:0.5px solid var(--linen-200); border-radius:12px; padding:9px 12px; display:flex; align-items:center; gap:10px; position:relative; overflow:hidden; transition:border-color 0.2s, box-shadow 0.2s; animation:slideIn 0.15s ease both; }
.item-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; }
.item-card.must.pending { border-color:var(--red-200); background:var(--red-50); }
.item-card.must.pending::before { background:var(--red-600); }
.item-card.flex.pending::before { background:var(--wheat-400); }
.item-card.confirmed { opacity:0.45; }
.item-card.confirmed::before { background:var(--sage-800); }
.item-card:hover { border-color:var(--sage-200); box-shadow:0 3px 10px rgba(61,107,84,0.07); }
.item-card.must.pending:hover { border-color:var(--red-400); }
.item-main { flex:1; min-width:0; }
.item-name { font-size:13px; font-weight:500; color:var(--linen-900); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.4; }
.item-card.must.pending .item-name { color:var(--red-600); }
.item-card.confirmed .item-name { color:var(--linen-400); }
.item-sub { display:flex; align-items:center; gap:5px; margin-top:3px; flex-wrap:wrap; }
.cat-tag { display:inline-block; font-size:10px; color:var(--linen-400); background:var(--linen-50); border:0.5px solid var(--linen-200); border-radius:4px; padding:1px 6px; }
.day-tag { font-size:10px; color:var(--linen-400); }
.item-notes-sm { font-size:11px; color:var(--linen-700); font-style:italic; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100px; }
.item-right { flex-shrink:0; display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
.priority-btn { font-size:10px; border-radius:100px; padding:2px 9px; cursor:pointer; border:none; font-family:var(--font-sans); transition:all 0.15s; white-space:nowrap; }
.priority-btn.must { background:var(--red-50); color:var(--red-600); border:1px solid var(--red-200); }
.priority-btn.flex { background:var(--wheat-50); color:var(--wheat-700); border:1px solid var(--wheat-200); }
.status-select { border:1.5px solid var(--linen-200); border-radius:100px; padding:2px 20px 2px 8px; font-size:10px; font-family:var(--font-sans); color:var(--linen-700); background:var(--linen-50); outline:none; appearance:none; cursor:pointer; background-image:url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 8 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L4 4L7 1' stroke='%23A8A298' stroke-width='1' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat:no-repeat; background-position:right 7px center; flex-shrink:0; transition:all 0.15s; }
.status-select[data-status="候選"]   { background-color:var(--linen-50);  color:var(--linen-400);  border-color:var(--linen-200); }
.status-select[data-status="選定"]   { background-color:var(--wheat-50);  color:var(--wheat-700);  border-color:var(--wheat-200); }
.status-select[data-status="跟進中"] { background-color:var(--sage-50);   color:var(--sage-800);   border-color:var(--sage-200); }
.status-select[data-status="等回覆"] { background-color:var(--wheat-50);  color:var(--wheat-700);  border-color:var(--wheat-400); }
.status-select[data-status="已確認"] { background-color:var(--sage-50);   color:var(--sage-800);   border-color:var(--sage-800); }
.delete-btn { background:none; border:none; cursor:pointer; font-size:11px; color:var(--linen-200); padding:0 2px; transition:color 0.15s; }
.delete-btn:hover { color:var(--linen-400); }
.inline-input { font-family:var(--font-sans); font-size:13px; font-weight:500; color:var(--linen-900); background:var(--sage-50); border:1.5px solid var(--sage-400); border-radius:6px; padding:2px 6px; outline:none; width:100%; }

/* ── Kanban 看板（Day 視角）── */
.kanban-wrap { padding:16px; overflow-x:auto; }
.board-group { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; margin-bottom:12px; }
.day-col { display:flex; flex-direction:column; gap:8px; }
.day-header { display:flex; align-items:center; gap:6px; padding-bottom:8px; border-bottom:0.5px solid var(--linen-200); }
.day-dot { width:8px; height:8px; border-radius:50%; background:var(--sage-400); flex-shrink:0; }
.day-dot.has-pending { background:var(--wheat-400); }
.day-dot.all-clear   { background:var(--sage-800); }
.day-title { font-size:12px; font-weight:500; color:var(--linen-700); letter-spacing:0.04em; }
.day-count { font-size:10px; color:var(--linen-400); margin-left:auto; }
.day-count.has-pending { color:var(--wheat-400); }
.kanban-card { background:#fff; border:0.5px solid var(--linen-200); border-radius:12px; padding:10px 12px; display:flex; flex-direction:column; gap:4px; position:relative; overflow:hidden; transition:border-color 0.2s,box-shadow 0.2s; animation:slideIn 0.15s ease both; }
.kanban-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; }
.kanban-card[data-status="候選"]::before   { background:var(--linen-400); }
.kanban-card[data-status="選定"]::before   { background:var(--wheat-400); }
.kanban-card[data-status="跟進中"]::before { background:var(--sage-400); }
.kanban-card[data-status="等回覆"]::before { background:var(--wheat-700); }
.kanban-card[data-status="已確認"]::before { background:var(--sage-800); }
.kanban-card:hover { border-color:var(--sage-200); box-shadow:0 4px 12px rgba(61,107,84,0.08); }
.kanban-card.confirmed { opacity:0.5; }
.kanban-card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:6px; }
.kanban-name { font-size:13px; font-weight:500; color:var(--linen-900); flex:1; min-width:0; line-height:1.4; word-break:break-all; }
.kanban-name:hover { background:var(--linen-50); border-radius:4px; cursor:text; outline:1.5px dashed var(--linen-200); outline-offset:2px; }
.kanban-card-bottom { display:flex; align-items:center; justify-content:space-between; gap:4px; }
.col-empty { text-align:center; padding:1.5rem 0.5rem; color:var(--linen-200); font-size:11px; font-style:italic; }

/* ── 行李 & 購物 清單 ── */
.checklist-wrap { padding:12px 16px; }
.checklist-add-row { display:flex; gap:8px; margin-bottom:16px; }
.checklist-input { flex:1; border:1.5px solid var(--sage-400); border-radius:100px; padding:8px 16px; font-size:13px; font-family:var(--font-sans); color:var(--linen-900); background:#fff; outline:none; transition:border-color 0.15s; }
.checklist-input:focus { border-color:var(--sage-800); }
.checklist-add-btn { width:36px; height:36px; border-radius:50%; background:var(--sage-800); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; color:#fff; font-size:18px; line-height:1; transition:background 0.15s; }
.checklist-add-btn:hover { background:var(--sage-900); }
.checklist-progress { font-size:11px; color:var(--linen-400); margin-bottom:10px; }
.checklist-progress-bar { height:3px; background:var(--linen-200); border-radius:100px; margin-bottom:12px; overflow:hidden; }
.checklist-progress-fill { height:100%; background:var(--sage-800); border-radius:100px; transition:width 0.3s; }
.checklist-items { display:flex; flex-direction:column; gap:6px; }
.checklist-item { display:flex; align-items:center; gap:10px; background:#fff; border:0.5px solid var(--linen-200); border-radius:12px; padding:10px 12px; transition:opacity 0.2s; animation:slideIn 0.15s ease both; }
.checklist-item.checked { opacity:0.45; }
.check-circle { width:20px; height:20px; border-radius:50%; border:1.5px solid var(--linen-200); flex-shrink:0; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.15s; background:#fff; }
.checklist-item.checked .check-circle { background:var(--sage-800); border-color:var(--sage-800); }
.checklist-item-name { flex:1; font-size:13px; color:var(--linen-900); line-height:1.4; }
.checklist-item.checked .checklist-item-name { text-decoration:line-through; color:var(--linen-400); }
.checklist-delete { background:none; border:none; cursor:pointer; font-size:11px; color:var(--linen-200); padding:0 2px; transition:color 0.15s; flex-shrink:0; }
.checklist-delete:hover { color:var(--linen-400); }

/* ── 首頁（未選旅程）── */
.home-header { background:var(--linen-50); border-bottom:0.5px solid var(--linen-200); padding:1.25rem 1.5rem; position:sticky; top:0; z-index:90; }
.home-header-inner { max-width:680px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:1rem; }
.brand { display:flex; align-items:center; gap:10px; }
.brand-logo { width:36px; height:36px; border:2px solid var(--sage-800); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1rem; flex-shrink:0; }
.brand-name { font-size:22px; color:var(--linen-900); font-weight:500; }
.brand-sub { font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--linen-400); }
.btn-ghost { background:transparent; color:var(--linen-400); border:1px solid var(--linen-200); border-radius:100px; padding:8px 18px; font-size:13px; font-family:var(--font-sans); cursor:pointer; transition:all 0.15s; }
.btn-ghost:hover { color:var(--linen-900); border-color:var(--linen-400); }
.home-body { max-width:680px; margin:0 auto; padding:2rem 1.5rem 0; }
.page-title { font-size:30px; font-weight:500; color:var(--linen-900); line-height:1.3; margin-bottom:0.3rem; }
.page-sub { font-size:16px; color:var(--linen-400); margin-bottom:2rem; }
.trip-selector-row { display:flex; align-items:center; gap:10px; margin-bottom:1.5rem; flex-wrap:wrap; }
.trip-select-home { flex:1; min-width:160px; border:1.5px solid var(--sage-400); border-radius:100px; padding:9px 36px 9px 18px; font-size:14px; font-family:var(--font-sans); color:var(--linen-900); background:#fff; outline:none; appearance:none; cursor:pointer; background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 7L11 1' stroke='%238AB8A0' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat:no-repeat; background-position:right 14px center; }

/* ── 固定隨身項目 ── */
.fixed-section { background:#fff; border:0.5px solid var(--linen-200); border-radius:14px; padding:12px 14px; margin-bottom:8px; }
.fixed-section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.fixed-section-label { font-size:11px; font-weight:500; color:var(--linen-700); letter-spacing:0.06em; text-transform:uppercase; }
.fixed-reset-btn { font-size:11px; color:var(--linen-400); background:none; border:none; cursor:pointer; padding:0; font-family:var(--font-sans); text-decoration:underline; }
.fixed-reset-btn:hover { color:var(--linen-900); }
.fixed-group-label { font-size:10px; color:var(--linen-400); letter-spacing:0.06em; text-transform:uppercase; margin:10px 0 5px; }
.fixed-group-label:first-of-type { margin-top:0; }
.fixed-items { display:flex; flex-direction:column; gap:4px; }
.fixed-item { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:0.5px solid var(--linen-50); cursor:pointer; }
.fixed-item:last-child { border-bottom:none; }
.fixed-item.checked { opacity:0.45; }
.fixed-check { width:18px; height:18px; border-radius:50%; border:1.5px solid var(--linen-200); flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all 0.15s; background:#fff; }
.fixed-item.checked .fixed-check { background:var(--sage-800); border-color:var(--sage-800); }
.fixed-item-name { font-size:13px; color:var(--linen-900); line-height:1.4; flex:1; }
.fixed-item.checked .fixed-item-name { text-decoration:line-through; color:var(--linen-400); }
.fixed-item-note { font-size:10px; color:var(--linen-400); font-style:italic; }

/* 分隔線 */
.section-divider { display:flex; align-items:center; gap:8px; font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:var(--linen-400); margin:14px 0 10px; }
.section-divider::before, .section-divider::after { content:''; flex:1; height:0.5px; background:var(--linen-200); }

/* 空狀態 */
.empty-state { text-align:center; padding:3rem 1rem; color:var(--linen-400); }
.empty-state-icon { font-size:2.5rem; margin-bottom:1rem; }
.empty-state-text { font-size:15px; }

/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(60,56,48,0.45); z-index:200; display:flex; align-items:center; justify-content:center; padding:1rem; opacity:0; pointer-events:none; transition:opacity 0.2s; }
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal { background:#fff; border-radius:24px; padding:2rem; width:100%; max-width:440px; transform:translateY(12px); transition:transform 0.2s; }
.modal-overlay.open .modal { transform:translateY(0); }
.modal-title { font-size:20px; font-weight:500; color:var(--linen-900); margin-bottom:1.5rem; }
.modal-actions { display:flex; gap:10px; margin-top:1.5rem; justify-content:flex-end; }
.ai-modal { max-width:560px; }
.ai-textarea { width:100%; border:1.5px solid var(--sage-400); border-radius:16px; padding:14px 16px; font-size:14px; font-family:var(--font-sans); color:var(--linen-900); background:#fff; outline:none; resize:vertical; min-height:140px; line-height:1.7; }
.ai-textarea::placeholder { color:var(--linen-400); }
.ai-key-row { display:flex; align-items:center; gap:8px; margin-top:10px; }
.ai-key-label { font-size:11px; color:var(--linen-400); white-space:nowrap; letter-spacing:0.05em; text-transform:uppercase; }
.ai-key-input { flex:1; border:1.5px solid var(--linen-200); border-radius:100px; padding:7px 14px; font-size:13px; font-family:monospace; color:var(--linen-700); background:var(--linen-50); outline:none; }
.ai-loading { display:flex; flex-direction:column; align-items:center; gap:1rem; padding:2rem 0; }
.ai-spinner { width:32px; height:32px; border:2.5px solid var(--sage-200); border-top-color:var(--sage-800); border-radius:50%; animation:spin 0.7s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.ai-loading-text { font-size:14px; color:var(--linen-400); }
.ai-error { background:#fff3f3; border:1px solid #f0c0c0; border-radius:12px; padding:12px 16px; font-size:13px; color:#c0392b; margin:1rem 0; }
.preview-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.preview-count { font-size:12px; color:var(--linen-400); }
.preview-select-all { font-size:12px; color:var(--sage-800); cursor:pointer; text-decoration:underline; background:none; border:none; padding:0; font-family:var(--font-sans); }
.preview-list { display:flex; flex-direction:column; gap:8px; margin:1rem 0; max-height:300px; overflow-y:auto; }
.preview-item { display:flex; align-items:flex-start; gap:10px; background:var(--linen-50); border:0.5px solid var(--linen-200); border-radius:12px; padding:10px 14px; cursor:pointer; transition:all 0.15s; }
.preview-item.selected { background:var(--sage-50); border-color:var(--sage-400); }
.preview-check { width:18px; height:18px; border-radius:50%; border:1.5px solid var(--linen-200); flex-shrink:0; margin-top:2px; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
.preview-item.selected .preview-check { background:var(--sage-800); border-color:var(--sage-800); }
.preview-check svg { display:none; }
.preview-item.selected .preview-check svg { display:block; }
.preview-body { flex:1; min-width:0; }
.preview-name { font-size:14px; font-weight:500; color:var(--linen-900); margin-bottom:2px; }
.preview-meta { font-size:12px; color:var(--linen-400); }
.preview-status-badge { font-size:11px; border-radius:100px; padding:2px 10px; white-space:nowrap; flex-shrink:0; }
.badge-候選   { background:var(--linen-200); color:var(--linen-700); }
.badge-選定   { background:var(--wheat-50); color:var(--wheat-700); border:1px solid var(--wheat-200); }
.badge-跟進中 { background:var(--sage-50); color:var(--sage-800); border:1px solid var(--sage-200); }
.badge-等回覆 { background:var(--wheat-50); color:var(--wheat-700); border:1px solid var(--wheat-400); }
.badge-已確認 { background:var(--sage-50); color:var(--sage-800); border:1px solid var(--sage-800); }

@keyframes slideIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }

@media (max-width:600px) {
  .board-group { grid-template-columns:1fr; }
  .day-col { margin-bottom:1.5rem; }
}
@media (min-width:601px) and (max-width:900px) {
  .board-group { grid-template-columns:repeat(2,minmax(0,1fr)); }
}
</style>
</head>
<body>

<div class="sync-bar" id="sync-bar"></div>

<!-- ══ 首頁（未選旅程）══ -->
<div id="page-home">
  <header class="home-header">
    <div class="home-header-inner">
      <div class="brand">
        <div class="brand-logo">🔍</div>
        <div><div class="brand-name">Scout</div><div class="brand-sub">行前確認</div></div>
      </div>
      <button class="btn-ghost" onclick="openTripModal()">＋ 新增旅程</button>
    </div>
  </header>
  <div class="home-body">
    <div class="page-title">出發前，先看清楚</div>
    <div class="page-sub">哪些項目還沒確認？</div>
    <div class="trip-selector-row">
      <select class="trip-select-home" id="trip-select-home" onchange="onTripChange(this.value)">
        <option value="">— 選擇旅程 —</option>
      </select>
      <button class="btn-ghost" id="delete-trip-btn" onclick="deleteCurrentTrip()" style="display:none">刪除旅程</button>
    </div>
    <div class="empty-state" id="no-trip-state">
      <div class="empty-state-icon">✈️</div>
      <div class="empty-state-text">點右上角「新增旅程」開始</div>
    </div>
  </div>
</div>

<!-- ══ 行程頁 ══ -->
<div id="page-itinerary" style="display:none">
  <header class="app-header">
    <div class="header-logo">🔍</div>
    <select class="trip-select" id="trip-select-board" onchange="onTripChange(this.value)">
      <option value="">— 選擇旅程 —</option>
    </select>
    <div class="urgent-badge" id="urgent-badge">
      <span class="urgent-badge-num" id="urgent-num">0</span>
      <span class="urgent-badge-lbl" id="urgent-lbl">必須未確認</span>
    </div>
    <button class="ai-btn" onclick="openAiModal()">✦ AI</button>
    <button class="add-btn" onclick="toggleAddPanel()" title="新增項目">＋</button>
  </header>

  <!-- 視角切換 -->
  <div class="view-tabs">
    <button class="view-tab active" id="tab-priority" onclick="setView('priority')">優先級</button>
    <button class="view-tab" id="tab-day" onclick="setView('day')">Day</button>
  </div>

  <!-- Filter 列（優先級視角）-->
  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all',this)">全部</button>
    <button class="filter-btn" onclick="setFilter('必須',this)">必須確認</button>
    <button class="filter-btn" onclick="setFilter('彈性',this)">可以彈性</button>
    <button class="filter-btn" onclick="setFilter('未確認',this)">未確認</button>
    <button class="filter-btn" onclick="setFilter('已確認',this)">已確認</button>
  </div>

  <!-- 新增面板 -->
  <div class="add-panel" id="add-panel">
    <div class="add-panel-header">
      <div class="add-panel-title">新增行程項目</div>
      <button class="add-panel-close" onclick="toggleAddPanel()">✕</button>
    </div>
    <div class="form-row">
      <div class="form-field" style="flex:2;min-width:160px"><label class="form-label">項目名稱</label><input class="form-input" id="new-name" placeholder="例：鼎泰豐訂位"></div>
      <div class="form-field" style="max-width:80px"><label class="form-label">第幾天</label><input class="form-input" id="new-day" type="number" min="1" placeholder="1"></div>
    </div>
    <div class="form-row">
      <div class="form-field"><label class="form-label">重要程度</label><select class="form-select" id="new-priority"><option value="必須">必須確認</option><option value="彈性">可以彈性</option></select></div>
      <div class="form-field"><label class="form-label">分類</label><select class="form-select" id="new-category"><option value="餐廳">餐廳</option><option value="景點">景點</option><option value="交通">交通</option><option value="住宿">住宿</option><option value="其他">其他</option></select></div>
      <div class="form-field"><label class="form-label">初始狀態</label><select class="form-select" id="new-status"><option value="候選">候選</option><option value="選定">選定</option><option value="跟進中">跟進中</option><option value="等回覆">等回覆</option><option value="已確認">已確認</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-field"><label class="form-label">備註（選填）</label><input class="form-input" id="new-notes" placeholder="例：需電話預約"></div>
    </div>
    <div class="form-submit-row">
      <button class="btn-primary" onclick="addItem()">新增 <span class="icon-circle"><svg width="11" height="11" viewBox="0 0 13 13" fill="none"><path d="M6.5 2V11M2 6.5H11" stroke="#3D6B54" stroke-width="1.5" stroke-linecap="round"/></svg></span></button>
    </div>
  </div>

  <!-- 優先級視角 -->
  <div id="view-priority">
    <div class="board-body" id="priority-container"></div>
  </div>

  <!-- Day 視角（Kanban）-->
  <div id="view-day" style="display:none">
    <div class="kanban-wrap">
      <div id="kanban-container"></div>
    </div>
  </div>
</div>

<!-- ══ 行李頁 ══ -->
<div id="page-luggage" style="display:none">
  <header class="app-header">
    <div class="header-logo">🧳</div>
    <div class="header-title">行李清單</div>
    <div class="header-spacer"></div>
    <div style="font-size:11px;color:var(--linen-400)" id="luggage-progress-text"></div>
  </header>
  <div class="checklist-wrap">

    <!-- ── 固定隨身項目 ── -->
    <div class="fixed-section">
      <div class="fixed-section-header">
        <span class="fixed-section-label">隨身行李・固定項目</span>
        <button class="fixed-reset-btn" onclick="resetFixedItems()">重置勾選</button>
      </div>
      <div class="fixed-group-label">證件與貴重物品</div>
      <div class="fixed-items" id="fixed-docs"></div>
      <div class="fixed-group-label">3C 電子產品</div>
      <div class="fixed-items" id="fixed-3c"></div>
      <div class="fixed-group-label">個人護理用品</div>
      <div class="fixed-items" id="fixed-care"></div>
    </div>

    <div class="section-divider">自訂清單</div>

    <!-- ── 自訂清單 ── -->
    <div class="checklist-add-row">
      <input class="checklist-input" id="luggage-input" placeholder="新增行李項目…" onkeydown="handleChecklistEnter(event,'luggage')">
      <button class="checklist-add-btn" onclick="addChecklistItem('luggage')">＋</button>
    </div>
    <div class="checklist-progress-bar"><div class="checklist-progress-fill" id="luggage-bar" style="width:0%"></div></div>
    <div class="checklist-items" id="luggage-items"></div>
  </div>
</div>

<!-- ══ 購物頁 ══ -->
<div id="page-shopping" style="display:none">
  <header class="app-header">
    <div class="header-logo">🛍️</div>
    <div class="header-title">購物清單</div>
    <div class="header-spacer"></div>
    <div style="font-size:11px;color:var(--linen-400)" id="shopping-progress-text"></div>
  </header>
  <div class="checklist-wrap">

    <!-- ── 固定項目 ── -->
    <div class="fixed-section">
      <div class="fixed-section-header">
        <span class="fixed-section-label">固定提醒</span>
        <button class="fixed-reset-btn" onclick="resetFixedShoppingItems()">重置勾選</button>
      </div>
      <div class="fixed-items" id="fixed-shopping"></div>
    </div>

    <div class="section-divider">自訂清單</div>

    <!-- ── 自訂清單 ── -->
    <div class="checklist-add-row">
      <input class="checklist-input" id="shopping-input" placeholder="新增購物項目…" onkeydown="handleChecklistEnter(event,'shopping')">
      <button class="checklist-add-btn" onclick="addChecklistItem('shopping')">＋</button>
    </div>
    <div class="checklist-progress-bar"><div class="checklist-progress-fill" id="shopping-bar" style="width:0%"></div></div>
    <div class="checklist-items" id="shopping-items"></div>
  </div>
</div>

<!-- ══ 底部導覽列 ══ -->
<nav class="bottom-nav" id="bottom-nav" style="display:none">
  <button class="nav-tab active" id="nav-itinerary" onclick="switchTab('itinerary')">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="14" height="13" rx="2"/><path d="M7 2v4M13 2v4M3 9h14"/></svg>
    行程
  </button>
  <button class="nav-tab" id="nav-luggage" onclick="switchTab('luggage')">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="5" width="8" height="12" rx="2"/><path d="M8 5V3h4v2M4 8h12"/></svg>
    行李
  </button>
  <button class="nav-tab" id="nav-shopping" onclick="switchTab('shopping')">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3h10l1.5 9H3.5L5 3z"/><circle cx="8" cy="16" r="1.2" fill="currentColor"/><circle cx="13" cy="16" r="1.2" fill="currentColor"/></svg>
    購物
  </button>
</nav>

<!-- 新增旅程 Modal -->
<div class="modal-overlay" id="trip-modal" onclick="closeTripModalOnOverlay(event)">
  <div class="modal">
    <div class="modal-title">新增旅程</div>
    <div class="form-row"><div class="form-field"><label class="form-label">旅程名稱</label><input class="form-input" id="modal-trip-name" placeholder="例：日本關西 2026 五月"></div></div>
    <div class="form-row">
      <div class="form-field"><label class="form-label">出發日</label><input class="form-input" id="modal-start" type="date"></div>
      <div class="form-field"><label class="form-label">回程日</label><input class="form-input" id="modal-end" type="date"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeTripModal()">取消</button>
      <button class="btn-primary" onclick="createTrip()">建立旅程 <span class="icon-circle"><svg width="11" height="11" viewBox="0 0 13 13" fill="none"><path d="M2 11L11 2M11 2H4M11 2V9" stroke="#3D6B54" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span></button>
    </div>
  </div>
</div>

<!-- AI 匯入 Modal -->
<div class="modal-overlay" id="ai-modal" onclick="closeAiModalOnOverlay(event)">
  <div class="modal ai-modal">
    <div class="modal-title">✦ AI 匯入行程</div>
    <p style="font-size:13px;color:var(--linen-400);margin-bottom:1rem">貼入 LINE 訊息、備忘錄、或複製自 Excel 的行程表，AI 會自動解析成項目。</p>
    <textarea class="ai-textarea" id="ai-paste-input" placeholder="例：&#10;Day1 上午：鼎泰豐（已訂位）&#10;Day1 下午：故宮博物院（還沒買票）"></textarea>
    <div class="ai-key-row"><span class="ai-key-label">API Key</span><input class="ai-key-input" id="ai-key-input" type="password" placeholder="AIza...（僅存在本機）"></div>
    <div id="ai-modal-error"></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeAiModal()">取消</button>
      <button class="btn-primary" onclick="runAiParse()">解析 <span class="icon-circle"><svg width="11" height="11" viewBox="0 0 13 13" fill="none"><path d="M2 11L11 2M11 2H4M11 2V9" stroke="#3D6B54" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span></button>
    </div>
  </div>
</div>

<!-- AI 預覽 Modal -->
<div class="modal-overlay" id="preview-modal" onclick="closePreviewModalOnOverlay(event)">
  <div class="modal ai-modal">
    <div class="modal-title">確認匯入項目</div>
    <div class="ai-loading" id="preview-loading"><div class="ai-spinner"></div><div class="ai-loading-text">AI 正在解析行程內容…</div></div>
    <div id="preview-result" style="display:none">
      <div class="preview-header"><span class="preview-count" id="preview-count"></span><button class="preview-select-all" onclick="toggleSelectAll()">全選 / 取消全選</button></div>
      <div class="preview-list" id="preview-list"></div>
      <div id="preview-error"></div>
      <div class="modal-actions">
        <button class="btn-ghost" onclick="closePreviewModal()">取消</button>
        <button class="btn-primary" onclick="confirmImport()">匯入選取項目 <span class="icon-circle"><svg width="11" height="11" viewBox="0 0 13 13" fill="none"><path d="M6.5 2V11M2 6.5H11" stroke="#3D6B54" stroke-width="1.5" stroke-linecap="round"/></svg></span></button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js';
import { getDatabase, ref, set, push, remove, onValue, update } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js';

const firebaseConfig = {
  apiKey:"AIzaSyAXzF_wiFJBzBy8vh-clfWK2AIZ1uCR5vg",
  authDomain:"scout-checklist.firebaseapp.com",
  databaseURL:"https://scout-checklist-default-rtdb.firebaseio.com",
  projectId:"scout-checklist",
  storageBucket:"scout-checklist.firebasestorage.app",
  messagingSenderId:"441876091472",
  appId:"1:441876091472:web:29e20124a5a40493417755"
};
const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const STATUSES=['候選','選定','跟進中','等回覆','已確認'];
const PENDING_STATUSES=new Set(['候選','選定','跟進中','等回覆']);
const VALID_CATS=['餐廳','景點','交通','住宿','其他'];
const AI_KEY_STORE='scout_ai_key';

let trips={},items={},luggage={},shopping={};
let currentTripId=null,currentFilter='all',currentView='priority',currentTab='home';

// ── 同步狀態 ──
function setSyncStatus(s){
  const bar=document.getElementById('sync-bar');
  bar.className='sync-bar'+(s==='syncing'?' syncing':s==='error'?' error':'');
}

// ── Firebase 監聽 ──
onValue(ref(db,'trips'),snap=>{trips=snap.val()||{};renderTripSelects(currentTripId);renderAll();setSyncStatus('live');},err=>{setSyncStatus('error');});
onValue(ref(db,'items'),snap=>{items=snap.val()||{};renderAll();});
onValue(ref(db,'luggage'),snap=>{luggage=snap.val()||{};renderChecklist('luggage');});
onValue(ref(db,'shopping'),snap=>{shopping=snap.val()||{};renderChecklist('shopping');});

// ── Tab 切換 ──
window.switchTab=function(tab){
  currentTab=tab;
  ['home','itinerary','luggage','shopping'].forEach(t=>{
    const el=document.getElementById('page-'+t);
    if(el)el.style.display=t===tab?'':'none';
  });
  ['itinerary','luggage','shopping'].forEach(t=>{
    const btn=document.getElementById('nav-'+t);
    if(btn)btn.classList.toggle('active',t===tab);
  });
  if(tab==='itinerary')renderAll();
  if(tab==='luggage')renderChecklist('luggage');
  if(tab==='shopping')renderChecklist('shopping');
};

// ── 視角切換 ──
window.setView=function(v){
  currentView=v;
  document.getElementById('tab-priority').classList.toggle('active',v==='priority');
  document.getElementById('tab-day').classList.toggle('active',v==='day');
  document.getElementById('view-priority').style.display=v==='priority'?'':'none';
  document.getElementById('view-day').style.display=v==='day'?'':'none';
  document.getElementById('filter-bar').style.display=v==='priority'?'':'none';
  renderAll();
};

// ── 旅程 CRUD ──
window.createTrip=function(){
  const name=document.getElementById('modal-trip-name').value.trim();
  const start=document.getElementById('modal-start').value,end=document.getElementById('modal-end').value;
  if(!name){alert('請輸入旅程名稱');return;}
  setSyncStatus('syncing');
  const nr=push(ref(db,'trips'));
  set(nr,{name,startDate:start,endDate:end}).then(()=>{
    closeTripModal();currentTripId=nr.key;
    renderTripSelects(currentTripId);
    // 選好旅程後切到行程頁
    document.getElementById('page-home').style.display='none';
    document.getElementById('bottom-nav').style.display='flex';
    switchTab('itinerary');
  });
};

window.deleteCurrentTrip=function(){
  if(!currentTripId)return;
  const trip=trips[currentTripId];if(!trip)return;
  if(!confirm('確定要刪除「'+trip.name+'」？'))return;
  setSyncStatus('syncing');
  Object.keys(items).forEach(k=>{if(items[k].tripId===currentTripId)remove(ref(db,'items/'+k));});
  remove(ref(db,'trips/'+currentTripId)).then(()=>{currentTripId=null;renderAll();});
};

// ── 旅程切換 ──
window.onTripChange=function(val){
  currentTripId=val||null;
  document.getElementById('trip-select-home').value=val;
  document.getElementById('trip-select-board').value=val;
  document.getElementById('delete-trip-btn').style.display=val?'':'none';
  currentFilter='all';
  document.querySelectorAll('.filter-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  if(val){
    // 進入行程頁

// ── Render 行李/購物清單 ──
function renderChecklist(type){
  const data=type==='luggage'?luggage:shopping;
  const container=document.getElementById(type+'-items');
  const progressText=document.getElementById(type+'-progress-text');
  const progressBar=document.getElementById(type+'-bar');
  if(!container)return;
  const all=Object.entries(data).sort(([,a],[,b])=>(a.createdAt||0)-(b.createdAt||0));
  const total=all.length;
  const checked=all.filter(([,v])=>v.checked).length;
  if(progressText)progressText.textContent=total>0?checked+' / '+total+' 完成':'';
  if(progressBar)progressBar.style.width=total>0?Math.round(checked/total*100)+'%':'0%';
  if(total===0){
    container.innerHTML='<div class="empty-state" style="padding:2rem 0"><div class="empty-state-icon">'+(type==='luggage'?'🧳':'🛍️')+'</div><div class="empty-state-text">還沒有項目，輸入後按 ＋ 新增</div></div>';
    return;
  }
  // 未勾選在前，已勾選在後
  const unchecked=all.filter(([,v])=>!v.checked);
  const done=all.filter(([,v])=>v.checked);
  container.innerHTML=[...unchecked,...done].map(([k,v])=>`
    <div class="checklist-item${v.checked?' checked':''}" data-id="${k}">
      <div class="check-circle" onclick="toggleChecklistItem('${type}','${k}')">
        ${v.checked?`<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5L4.5 7.5L8.5 2.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}
      </div>
      <div class="checklist-item-name">${escapeHtml(v.name)}</div>
      <button class="checklist-delete" onclick="deleteChecklistItem('${type}','${k}')">✕</button>
    </div>`).join('');
}

function updateUrgentBadge(){
  if(!currentTripId)return;
  const allItems=Object.values(items).filter(v=>v.tripId===currentTripId).map(v=>({...v,priority:v.priority||'必須'}));
  const urgentCount=allItems.filter(i=>i.priority==='必須'&&PENDING_STATUSES.has(i.status)).length;
  const badge=document.getElementById('urgent-badge');
  if(!badge)return;
  document.getElementById('urgent-num').textContent=urgentCount;
  badge.classList.toggle('clear',urgentCount===0&&allItems.length>0);
  document.getElementById('urgent-lbl').textContent=(urgentCount===0&&allItems.length>0)?'全部確認 ✓':'必須未確認';
}

// ── 優先級視角 Render ──
function renderPriority(){
  const container=document.getElementById('priority-container');
  if(!container)return;
  if(!currentTripId){container.innerHTML='';return;}
  const allItems=Object.entries(items).filter(([,v])=>v.tripId===currentTripId).map(([k,v])=>({_key:k,...v,priority:v.priority||'必須'}));
  let filtered=allItems;
  if(currentFilter==='必須')filtered=allItems.filter(i=>i.priority==='必須');
  else if(currentFilter==='彈性')filtered=allItems.filter(i=>i.priority==='彈性');
  else if(currentFilter==='未確認')filtered=allItems.filter(i=>PENDING_STATUSES.has(i.status));
  else if(currentFilter==='已確認')filtered=allItems.filter(i=>i.status==='已確認');
  if(allItems.length===0){container.innerHTML='<div class="empty-state"><div class="empty-state-icon">🗺️</div><div class="empty-state-text">還沒有行程項目<br>點右上角「＋」新增</div></div>';return;}
  const mustPending=filtered.filter(i=>i.priority==='必須'&&PENDING_STATUSES.has(i.status));
  const flexPending=filtered.filter(i=>i.priority==='彈性'&&PENDING_STATUSES.has(i.status));
  const done=filtered.filter(i=>i.status==='已確認');
  let html='';
  if(mustPending.length>0){html+=`<div class="section-label urgent">必須確認・未確認<div class="section-line"></div></div><div class="items-list">${mustPending.map(renderPriorityCard).join('')}</div>`;}
  if(flexPending.length>0){html+=`<div class="section-label flexible">可以彈性・未確認<div class="section-line"></div></div><div class="items-list">${flexPending.map(renderPriorityCard).join('')}</div>`;}
  if(done.length>0){html+=`<div class="section-label done">已確認<div class="section-line"></div></div><div class="items-list">${done.map(renderPriorityCard).join('')}</div>`;}
  if(!html)html='<div class="empty-state"><div class="empty-state-icon">✅</div><div class="empty-state-text">這個篩選條件下沒有項目</div></div>';
  container.innerHTML=html;
}

function renderPriorityCard(item){

// ── Kanban 視角 Render ──
function renderKanban(){
  const container=document.getElementById('kanban-container');
  if(!container||!currentTripId){if(container)container.innerHTML='';return;}
  const allItems=Object.entries(items).filter(([,v])=>v.tripId===currentTripId).map(([k,v])=>({_key:k,...v,priority:v.priority||'必須'}));
  if(allItems.length===0){container.innerHTML='<div class="empty-state"><div class="empty-state-icon">🗺️</div><div class="empty-state-text">還沒有行程項目</div></div>';return;}
  const allDays=[...new Set(allItems.map(i=>i.day))].sort((a,b)=>a-b);
  const byDay={};
  allItems.forEach(item=>{if(!byDay[item.day])byDay[item.day]=[];byDay[item.day].push(item);});
  allDays.forEach(d=>byDay[d].sort((a,b)=>(a.order||0)-(b.order||0)));
  const groups=[];for(let i=0;i<allDays.length;i+=4)groups.push(allDays.slice(i,i+4));
  container.innerHTML=groups.map(group=>{
    const cols=group.map(day=>{
      const dayItems=byDay[day]||[];
      const pending=dayItems.filter(i=>PENDING_STATUSES.has(i.status)).length;
      const dotClass=pending>0?'has-pending':dayItems.length>0?'all-clear':'';
      const countText=pending>0?pending+' 未確認':dayItems.length>0?'✓':'';
      const cardsHtml=dayItems.length>0?dayItems.map(renderKanbanCard).join(''):'<div class="col-empty">無項目</div>';
      return `<div class="day-col"><div class="day-header"><div class="day-dot ${dotClass}"></div><div class="day-title">Day ${day}</div><div class="day-count${pending>0?' has-pending':''}">${countText}</div></div><div>${cardsHtml}</div></div>`;
    }).join('');
    return `<div class="board-group">${cols}</div>`;
  }).join('');
}

function renderKanbanCard(item){
  const confirmed=item.status==='已確認';
  const opts=STATUSES.map(s=>`<option value="${s}"${s===item.status?' selected':''}>${s}</option>`).join('');
  return `<div class="kanban-card${confirmed?' confirmed':''}" data-id="${item._key}" data-status="${escapeHtml(item.status)}" style="margin-bottom:8px">
    <div class="kanban-card-top">
      <div class="kanban-name" onclick="startEditName('${item._key}',this)">${escapeHtml(item.name)}</div>
      <select class="status-select" data-status="${escapeHtml(item.status)}" onchange="updateStatus('${item._key}',this.value);this.setAttribute('data-status',this.value)">${opts}</select>
    </div>
    <div class="kanban-card-bottom">
      <span class="cat-tag">${escapeHtml(item.category)}</span>
      <button class="delete-btn" onclick="deleteItem('${item._key}')">✕</button>
    </div>
  </div>`;
}

window.runAiParse=async function(){
  const text=document.getElementById('ai-paste-input').value.trim(),key=document.getElementById('ai-key-input').value.trim(),errEl=document.getElementById('ai-modal-error');
  errEl.innerHTML='';
  if(!text){errEl.innerHTML='<div class="ai-error">請先貼入行程文字。</div>';return;}
  if(!key){errEl.innerHTML='<div class="ai-error">請輸入 Gemini API Key。</div>';return;}
  localStorage.setItem(AI_KEY_STORE,key);closeAiModalForce();openPreviewModal();
  const trip=trips[currentTripId];
  const ctx=trip?'旅程名稱：'+trip.name+'，出發日：'+(trip.startDate||'不明')+'，回程日：'+(trip.endDate||'不明'):'旅程資訊不明';
  const prompt='你是旅遊行程解析助理。從使用者貼入的非結構化文字中提取行程項目，回傳 JSON 陣列。\n\n每個項目格式：\n{"name":"項目名稱","day":1,"category":"餐廳","status":"候選","notes":"備註"}\n\ncategory 只能是：餐廳、景點、交通、住宿、其他\nstatus 判斷：已訂位/有確認號→已確認；等回覆/pending→等回覆；要訂/還沒訂→跟進中；想去/考慮→候選；已選但未行動→選定\n\n只回傳純 JSON 陣列，不加任何說明或 markdown。\n\n旅程背景：'+ctx+'\n\n以下是行程文字：\n\n'+text;
  try{
    const res=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+encodeURIComponent(key),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0,responseMimeType:'application/json'}})});
    if(!res.ok){const b=await res.json().catch(()=>({}));throw new Error((b.error&&b.error.message)||'API 錯誤 '+res.status);}
    const data=await res.json();
    const raw=((data.candidates?.[0]?.content?.parts?.[0]?.text)||'').replace(/```json|```/g,'').trim();
    let parsed;try{parsed=JSON.parse(raw);}catch(e){throw new Error('AI 回傳格式無法解析。');}
    if(!Array.isArray(parsed)||parsed.length===0)throw new Error('AI 未解析出任何項目。');
    parsedPreviewItems=parsed.map((p,i)=>({_pid:i,name:String(p.name||'未命名'),day:parseInt(p.day)||1,category:VALID_CATS.includes(p.category)?p.category:'其他',status:STATUSES.includes(p.status)?p.status:'候選',notes:String(p.notes||'')}));
    selectedPreviewIds=new Set(parsedPreviewItems.map(p=>p._pid));renderPreview();
  }catch(err){
    document.getElementById('preview-loading').style.display='none';document.getElementById('preview-result').style.display='';
    document.getElementById('preview-list').innerHTML='';document.getElementById('preview-error').innerHTML='<div class="ai-error">⚠ '+escapeHtml(err.message)+'</div>';document.getElementById('preview-count').textContent='';
  }
};
function renderPreview(){
  document.getElementById('preview-loading').style.display='none';document.getElementById('preview-result').style.display='';document.getElementById('preview-error').innerHTML='';
  document.getElementById('preview-count').textContent='共解析出 '+parsedPreviewItems.length+' 個項目';
  document.getElementById('preview-list').innerHTML=parsedPreviewItems.map(p=>{const sel=selectedPreviewIds.has(p._pid);const notesHtml=p.notes?`<div style="font-size:12px;font-style:italic;color:var(--linen-700);margin-top:2px">${escapeHtml(p.notes)}</div>`:'';return `<div class="preview-item${sel?' selected':''}" onclick="togglePreviewItem(${p._pid})"><div class="preview-check"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5L4.5 7.5L8.5 2.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="preview-body"><div class="preview-name">${escapeHtml(p.name)}</div><div class="preview-meta">Day ${p.day} · ${escapeHtml(p.category)}</div>${notesHtml}</div><span class="preview-status-badge badge-${p.status}">${escapeHtml(p.status)}</span></div>`;}).join('');
}
window.togglePreviewItem=function(pid){if(selectedPreviewIds.has(pid))selectedPreviewIds.delete(pid);else selectedPreviewIds.add(pid);renderPreview();};
window.toggleSelectAll=function(){if(selectedPreviewIds.size===parsedPreviewItems.length)selectedPreviewIds.clear();else selectedPreviewIds=new Set(parsedPreviewItems.map(p=>p._pid));renderPreview();};
window.confirmImport=function(){
  if(selectedPreviewIds.size===0){document.getElementById('preview-error').innerHTML='<div class="ai-error">請至少選取一個項目。</div>';return;}
  setSyncStatus('syncing');
  parsedPreviewItems.filter(p=>selectedPreviewIds.has(p._pid)).forEach(p=>{
    let maxOrder=0;Object.values(items).forEach(i=>{if(i.tripId===currentTripId&&i.day===p.day)maxOrder=Math.max(maxOrder,(i.order||0)+1);});
    push(ref(db,'items'),{tripId:currentTripId,day:p.day,name:p.name,category:p.category,status:p.status,notes:p.notes,priority:'必須',order:maxOrder});
  });
  closePreviewModal();
};

window.startEditName=function(k,el){

  input.focus();input.select();let c=false;
  input.addEventListener('compositionstart',()=>c=true);input.addEventListener('compositionend',()=>c=false);
  function save(){const val=input.value.trim()||cur;if(val!==cur){setSyncStatus('syncing');update(ref(db,'items/'+k),{name:val});}const div=document.createElement('div');div.className=el.className;div.textContent=val;div.addEventListener('click',()=>startEditName(k,div));input.replaceWith(div);}
  input.addEventListener('blur',save);input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!c){e.preventDefault();input.blur();}if(e.key==='Escape'){input.value=cur;input.blur();}});
};

  const checked = getFixedChecked();

  if (careEl) careEl.innerHTML = renderGroup(FIXED_ITEMS.care);
}

function escapeHtml(str){return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeTripModal();closeAiModal();closePreviewModal();}});

// ── 購物固定項目 ──
const FIXED_SHOPPING_ITEMS = [
  { id:'s1', name:'伴手禮' },
  { id:'s2', name:'紀念品' },
];
const FIXED_SHOPPING_KEY = 'scout_fixed_shopping_checked';

function getFixedShoppingChecked() {
  try { return JSON.parse(localStorage.getItem(FIXED_SHOPPING_KEY)) || {}; }
  catch(e) { return {}; }
}

window.toggleFixedShoppingItem = function(id) {
  const checked = getFixedShoppingChecked();
  checked[id] = !checked[id];
  localStorage.setItem(FIXED_SHOPPING_KEY, JSON.stringify(checked));
  renderFixedShoppingItems();
};

window.resetFixedShoppingItems = function() {
  if (!confirm('確定要重置購物固定項目的勾選狀態嗎？')) return;
  localStorage.setItem(FIXED_SHOPPING_KEY, JSON.stringify({}));
  renderFixedShoppingItems();
};

function renderFixedShoppingItems() {
  const el = document.getElementById('fixed-shopping');
  if (!el) return;
  const checked = getFixedShoppingChecked();
  const checkSvg = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5L4.5 7.5L8.5 2.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  el.innerHTML = FIXED_SHOPPING_ITEMS.map(item => `
    <div class="fixed-item${checked[item.id]?' checked':''}" onclick="toggleFixedShoppingItem('${item.id}')">
      <div class="fixed-check">${checked[item.id]?checkSvg:''}</div>
      <div class="fixed-item-name">${escapeHtml(item.name)}</div>
    </div>`).join('');
}

// 初始化固定項目
renderFixedItems();
renderFixedShoppingItems();
renderAll();
</script>
</body>
</html>
